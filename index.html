<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kickoff ⚽</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #fff; font-family: 'DM Sans', sans-serif; }
    input, textarea, select {
      font-family: 'DM Sans', sans-serif;
      background: #16161f;
      border: 1.5px solid #2a2a3a;
      color: #fff;
      border-radius: 10px;
      padding: 12px 14px;
      width: 100%;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus, textarea:focus, select:focus { border-color: #00e676; }
    select option { background: #16161f; }
    .btn {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 1.5px;
      font-size: 17px;
      border: none;
      border-radius: 10px;
      padding: 13px 28px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      width: 100%;
    }
    .btn:active { transform: scale(0.97); }
    .btn-green { background: #00e676; color: #0a0a0f; }
    .btn-outline { background: transparent; border: 1.5px solid #2a2a3a; color: #aaa; margin-top: 10px; }
    .card {
      background: #13131c;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .card:hover { border-color: #333; transform: translateY(-2px); }
    .pill {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0d0d15; border-top: 1px solid #1a1a28; display: flex; justify-content: space-around; padding: 6px 0 12px; z-index: 100; }
    .nav-tab { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 16px; color: #555; font-family: 'DM Sans', sans-serif; font-size: 12px; transition: color 0.2s; }
    .nav-tab.active { color: #00e676; }
    .nav-tab span { font-size: 20px; }
    .progress-bar { background: #1e1e2e; border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; }
    .heading { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #00e676; color: #0a0a0f; padding: 12px 22px; border-radius: 12px; font-weight: 600; z-index: 999; font-size: 14px; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,230,118,0.3); }
    label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 6px; }
    .field { margin-bottom: 16px; }
    .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .level-btn { padding: 12px; border-radius: 10px; border: 1.5px solid #2a2a3a; background: #16161f; color: #aaa; cursor: pointer; font-weight: 500; font-size: 14px; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .level-btn.selected { border-color: #00e676; background: rgba(0,230,118,0.08); color: #00e676; }
    .format-grid { display: flex; gap: 8px; }
    .format-btn { flex: 1; padding: 11px 6px; border-radius: 10px; border: 1.5px solid #2a2a3a; background: #16161f; color: #aaa; cursor: pointer; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .player-row { display: flex; justify-content: space-between; align-items: center; background: #13131c; border-radius: 10px; padding: 12px 14px; border: 1px solid #1e1e2e; margin-bottom: 8px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const POSITIONS = ["Goalkeeper", "Defender", "Midfielder", "Striker", "Any"];
    const LEVELS = ["Beginner", "Casual", "Intermediate", "Competitive"];
    const FORMATS = ["5-a-side", "7-a-side", "11-a-side"];
    const FMT_COLORS = { "5-a-side": "#00e676", "7-a-side": "#29b6f6", "11-a-side": "#ff7043" };
    const FMT_SLOTS = { "5-a-side": 10, "7-a-side": 14, "11-a-side": 22 };

    const INITIAL_GAMES = [
      { id: 1, title: "Lunchtime Kickabout", format: "5-a-side", location: "Powerleague, Old Street", date: "2026-05-10", time: "12:30", players: [{ name: "Marcus T.", position: "Striker", level: "Casual" }, { name: "Dev P.", position: "Goalkeeper", level: "Intermediate" }, { name: "Liam O.", position: "Midfielder", level: "Casual" }], host: "Marcus T.", notes: "Bibs provided. Bring water." },
      { id: 2, title: "Evening 7s", format: "7-a-side", location: "Goals Soccer, Wembley", date: "2026-05-11", time: "19:00", players: [{ name: "Jamie R.", position: "Defender", level: "Intermediate" }, { name: "Sam K.", position: "Midfielder", level: "Competitive" }], host: "Jamie R.", notes: "Competitive but friendly." },
      { id: 3, title: "Weekend Warriors", format: "11-a-side", location: "Hackney Marshes, Pitch 4", date: "2026-05-12", time: "10:00", players: [{ name: "Tobi A.", position: "Goalkeeper", level: "Casual" }, { name: "Ben S.", position: "Striker", level: "Casual" }, { name: "Noah W.", position: "Defender", level: "Beginner" }], host: "Tobi A.", notes: "Muddy pitch likely!" },
    ];

    function App() {
      const [screen, setScreen] = useState("home");
      const [profile, setProfile] = useState(null);
      const [draft, setDraft] = useState({ name: "", position: "Any", level: "Casual" });
      const [games, setGames] = useState(INITIAL_GAMES);
      const [selected, setSelected] = useState(null);
      const [newGame, setNewGame] = useState({ title: "", format: "5-a-side", location: "", date: "", time: "", notes: "" });
      const [toast, setToast] = useState(null);

      function showToast(msg) { setToast(msg); setTimeout(() => setToast(null), 2800); }

      function saveProfile() {
        if (!draft.name.trim()) return showToast("Please enter your name.");
        setProfile(draft);
        showToast("Profile saved! Welcome, " + draft.name + " 🎉");
        setScreen("browse");
      }

      function createGame() {
        if (!newGame.title || !newGame.location || !newGame.date || !newGame.time) return showToast("Please fill in all fields.");
        if (!profile) return showToast("Set up your profile first!");
        const game = { id: Date.now(), ...newGame, players: [{ name: profile.name, position: profile.position, level: profile.level }], host: profile.name };
        setGames([game, ...games]);
        setNewGame({ title: "", format: "5-a-side", location: "", date: "", time: "", notes: "" });
        showToast("Game created! 🏟️");
        setScreen("browse");
      }

      function joinGame(game) {
        if (!profile) return showToast("Set up your profile first!");
        if (game.players.find(p => p.name === profile.name)) return showToast("You're already in this game.");
        const slots = FMT_SLOTS[game.format];
        if (game.players.length >= slots) return showToast("This game is full.");
        const updated = games.map(g => g.id === game.id ? { ...g, players: [...g.players, { name: profile.name, position: profile.position, level: profile.level }] } : g);
        setGames(updated);
        setSelected(updated.find(g => g.id === game.id));
        showToast("You joined the game! ⚽");
      }

      const spots = (g) => FMT_SLOTS[g.format] - g.players.length;

      return (
        <div style={{ minHeight: "100vh", paddingBottom: 80 }}>
          {toast && <div className="toast">{toast}</div>}

          {/* Header */}
          <div style={{ padding: "24px 20px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div className="heading" style={{ fontSize: 28, letterSpacing: 2 }}>⚽ KICKOFF</div>
              <div style={{ fontSize: 12, color: "#555", marginTop: 2 }}>Find your game</div>
            </div>
            {profile && (
              <button onClick={() => setScreen("profile")} style={{ background: "#16161f", border: "1.5px solid #2a2a3a", borderRadius: 10, padding: "8px 14px", cursor: "pointer", color: "#fff", textAlign: "left" }}>
                <div style={{ fontSize: 11, color: "#555" }}>Playing as</div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{profile.name}</div>
              </button>
            )}
          </div>

          <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>

            {/* HOME */}
            {screen === "home" && (
              <div>
                <div style={{ marginTop: 32, marginBottom: 40 }}>
                  <div className="heading" style={{ fontSize: 52, lineHeight: 1 }}>FIND YOUR<br /><span style={{ color: "#00e676" }}>NEXT GAME.</span></div>
                  <div style={{ marginTop: 12, color: "#888", fontSize: 15, lineHeight: 1.6 }}>Join open football sessions near you. No team needed — just show up and play.</div>
                </div>
                <button className="btn btn-green" style={{ fontSize: 20, padding: "16px" }} onClick={() => setScreen("profile")}>Set Up My Profile</button>
                <button className="btn btn-outline" onClick={() => setScreen("browse")}>Browse Games</button>
                <div style={{ display: "flex", gap: 12, marginTop: 32 }}>
                  {FORMATS.map(f => (
                    <div key={f} style={{ flex: 1, background: "#13131c", border: "1px solid #1e1e2e", borderRadius: 12, padding: "14px 10px", textAlign: "center" }}>
                      <div style={{ fontSize: 24 }}>{f === "5-a-side" ? "🥅" : f === "7-a-side" ? "⚡" : "🏟️"}</div>
                      <div style={{ fontSize: 11, color: "#888", marginTop: 6 }}>{f}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* PROFILE */}
            {screen === "profile" && (
              <div>
                <div className="heading" style={{ fontSize: 36, marginBottom: 4 }}>MY PROFILE</div>
                <div style={{ color: "#555", fontSize: 13, marginBottom: 28 }}>Tell us about yourself so we can match you to the right games.</div>
                <div className="field"><label>Your Name</label><input placeholder="e.g. Jamie R." value={draft.name} onChange={e => setDraft({ ...draft, name: e.target.value })} /></div>
                <div className="field"><label>Preferred Position</label>
                  <select value={draft.position} onChange={e => setDraft({ ...draft, position: e.target.value })}>
                    {POSITIONS.map(p => <option key={p}>{p}</option>)}
                  </select>
                </div>
                <div className="field"><label>Skill Level</label>
                  <div className="level-grid">
                    {LEVELS.map(l => <button key={l} className={`level-btn ${draft.level === l ? "selected" : ""}`} onClick={() => setDraft({ ...draft, level: l })}>{l}</button>)}
                  </div>
                </div>
                <button className="btn btn-green" style={{ marginTop: 8 }} onClick={saveProfile}>Save Profile</button>
              </div>
            )}

            {/* BROWSE */}
            {screen === "browse" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                  <div className="heading" style={{ fontSize: 36 }}>OPEN GAMES</div>
                  <button className="btn btn-green" style={{ width: "auto", fontSize: 14, padding: "10px 16px" }} onClick={() => setScreen("create")}>+ Create</button>
                </div>
                {games.map(game => {
                  const left = spots(game);
                  const total = FMT_SLOTS[game.format];
                  const pct = (game.players.length / total) * 100;
                  const col = FMT_COLORS[game.format];
                  const isJoined = profile && game.players.find(p => p.name === profile.name);
                  return (
                    <div key={game.id} className="card" onClick={() => { setSelected(game); setScreen("game"); }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div>
                          <div style={{ fontWeight: 600, fontSize: 16 }}>{game.title}</div>
                          <div style={{ fontSize: 13, color: "#666", marginTop: 2 }}>📍 {game.location}</div>
                        </div>
                        <span className="pill" style={{ background: col + "22", color: col }}>{game.format}</span>
                      </div>
                      <div style={{ display: "flex", gap: 16, marginTop: 12, fontSize: 13, color: "#888" }}>
                        <span>📅 {new Date(game.date).toLocaleDateString("en-GB", { day: "numeric", month: "short" })}</span>
                        <span>🕐 {game.time}</span>
                      </div>
                      <div style={{ marginTop: 14 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                          <span style={{ fontSize: 12, color: "#555" }}>{game.players.length} / {total} players</span>
                          <span style={{ fontSize: 12, color: left === 0 ? "#ff5252" : left <= 2 ? "#ffab40" : "#00e676" }}>{left === 0 ? "FULL" : `${left} spots left`}</span>
                        </div>
                        <div className="progress-bar"><div className="progress-fill" style={{ width: pct + "%", background: left === 0 ? "#ff5252" : col }} /></div>
                      </div>
                      {isJoined && <div style={{ marginTop: 10, fontSize: 12, color: "#00e676", fontWeight: 600 }}>✓ You're in this game</div>}
                    </div>
                  );
                })}
              </div>
            )}

            {/* CREATE */}
            {screen === "create" && (
              <div>
                <div className="heading" style={{ fontSize: 36, marginBottom: 4 }}>CREATE GAME</div>
                <div style={{ color: "#555", fontSize: 13, marginBottom: 24 }}>Set up your session and let others join.</div>
                <div className="field"><label>Game Title</label><input placeholder="e.g. Tuesday Night Kickabout" value={newGame.title} onChange={e => setNewGame({ ...newGame, title: e.target.value })} /></div>
                <div className="field"><label>Format</label>
                  <div className="format-grid">
                    {FORMATS.map(f => <button key={f} className="format-btn" style={{ borderColor: newGame.format === f ? FMT_COLORS[f] : "#2a2a3a", background: newGame.format === f ? FMT_COLORS[f] + "15" : "#16161f", color: newGame.format === f ? FMT_COLORS[f] : "#aaa" }} onClick={() => setNewGame({ ...newGame, format: f })}>{f}</button>)}
                  </div>
                </div>
                <div className="field"><label>Location</label><input placeholder="e.g. Powerleague, Shoreditch" value={newGame.location} onChange={e => setNewGame({ ...newGame, location: e.target.value })} /></div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
                  <div><label>Date</label><input type="date" value={newGame.date} onChange={e => setNewGame({ ...newGame, date: e.target.value })} /></div>
                  <div><label>Time</label><input type="time" value={newGame.time} onChange={e => setNewGame({ ...newGame, time: e.target.value })} /></div>
                </div>
                <div className="field"><label>Notes (optional)</label><textarea placeholder="e.g. Bibs provided, bring water..." rows={3} value={newGame.notes} onChange={e => setNewGame({ ...newGame, notes: e.target.value })} style={{ resize: "none" }} /></div>
                <button className="btn btn-green" onClick={createGame}>Create Game</button>
              </div>
            )}

            {/* GAME DETAIL */}
            {screen === "game" && selected && (() => {
              const game = games.find(g => g.id === selected.id) || selected;
              const left = spots(game);
              const total = FMT_SLOTS[game.format];
              const col = FMT_COLORS[game.format];
              const isJoined = profile && game.players.find(p => p.name === profile.name);
              return (
                <div>
                  <button onClick={() => setScreen("browse")} style={{ background: "none", border: "none", color: "#555", cursor: "pointer", fontSize: 14, padding: 0, marginBottom: 20 }}>← Back</button>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div className="heading" style={{ fontSize: 36, lineHeight: 1.1 }}>{game.title.toUpperCase()}</div>
                    <span className="pill" style={{ background: col + "22", color: col, marginTop: 4 }}>{game.format}</span>
                  </div>
                  <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
                    <div style={{ color: "#888", fontSize: 14 }}>📍 {game.location}</div>
                    <div style={{ color: "#888", fontSize: 14 }}>📅 {new Date(game.date).toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" })} at {game.time}</div>
                    <div style={{ color: "#888", fontSize: 14 }}>👤 Hosted by {game.host}</div>
                    {game.notes && <div style={{ color: "#666", fontSize: 13, fontStyle: "italic" }}>"{game.notes}"</div>}
                  </div>
                  <div style={{ marginTop: 20, background: "#13131c", borderRadius: 14, padding: 16, border: "1px solid #1e1e2e" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                      <span style={{ fontWeight: 600, fontSize: 15 }}>{game.players.length} / {total} players</span>
                      <span style={{ fontSize: 13, color: left === 0 ? "#ff5252" : left <= 2 ? "#ffab40" : "#00e676" }}>{left === 0 ? "FULL" : `${left} spots left`}</span>
                    </div>
                    <div className="progress-bar" style={{ height: 8 }}><div className="progress-fill" style={{ width: `${(game.players.length / total) * 100}%`, background: col }} /></div>
                  </div>
                  <div style={{ marginTop: 20 }}>
                    <div className="heading" style={{ fontSize: 22, marginBottom: 12 }}>SQUAD</div>
                    {game.players.map((p, i) => (
                      <div key={i} className="player-row">
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <div className="avatar" style={{ background: col + "22", color: col }}>{p.name.charAt(0)}</div>
                          <div>
                            <div style={{ fontWeight: 600, fontSize: 14 }}>{p.name} {p.name === game.host && <span style={{ fontSize: 11, color: "#555" }}>(host)</span>}</div>
                            <div style={{ fontSize: 12, color: "#555" }}>{p.position}</div>
                          </div>
                        </div>
                        <span className="pill" style={{ background: "#1e1e2e", color: "#888" }}>{p.level}</span>
                      </div>
                    ))}
                    {left > 0 && Array.from({ length: Math.min(left, 3) }).map((_, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, background: "#0f0f18", borderRadius: 10, padding: "12px 14px", border: "1px dashed #1e1e2e", marginBottom: 8 }}>
                        <div style={{ width: 32, height: 32, borderRadius: "50%", background: "#1a1a24", display: "flex", alignItems: "center", justifyContent: "center", color: "#333" }}>+</div>
                        <span style={{ fontSize: 13, color: "#333" }}>Open spot</span>
                      </div>
                    ))}
                  </div>
                  {!isJoined && left > 0 && <button className="btn btn-green" style={{ marginTop: 24, fontSize: 20, padding: "16px" }} onClick={() => joinGame(game)}>Join This Game ⚽</button>}
                  {isJoined && <div style={{ marginTop: 24, background: "rgba(0,230,118,0.08)", border: "1px solid rgba(0,230,118,0.2)", borderRadius: 14, padding: "16px", textAlign: "center" }}><div style={{ color: "#00e676", fontWeight: 600 }}>✓ You're in this game!</div><div style={{ fontSize: 13, color: "#555", marginTop: 4 }}>See you on the pitch.</div></div>}
                  {left === 0 && !isJoined && <div style={{ marginTop: 24, background: "#1a1015", border: "1px solid #3a1a1a", borderRadius: 14, padding: "16px", textAlign: "center" }}><div style={{ color: "#ff5252", fontWeight: 600 }}>Game is full</div></div>}
                </div>
              );
            })()}
          </div>

          {/* Bottom Nav */}
          <nav className="nav">
            {[{ id: "home", icon: "🏠", label: "Home" }, { id: "browse", icon: "🔍", label: "Games" }, { id: "create", icon: "➕", label: "Create" }, { id: "profile", icon: "👤", label: "Profile" }].map(tab => (
              <button key={tab.id} className={`nav-tab ${screen === tab.id ? "active" : ""}`} onClick={() => setScreen(tab.id)}>
                <span>{tab.icon}</span>{tab.label}
              </button>
            ))}
          </nav>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
