
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Golden Boot ⚽</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, arrayUnion, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA53AV8jLn1mkV1KbYAg-azpKxI5hkLMdY",
      authDomain: "golden-boot-5d3a9.firebaseapp.com",
      projectId: "golden-boot-5d3a9",
      storageBucket: "golden-boot-5d3a9.firebasestorage.app",
      messagingSenderId: "691535869518",
      appId: "1:691535869518:web:f3d9f902cd988ef017351f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window._gbAuth = auth;
    window._gbDb = db;
    window._gbFirestore = { collection, addDoc, onSnapshot, doc, updateDoc, arrayUnion, query, orderBy, serverTimestamp };
    window._gbAuthFns = { createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile };
    window._gbReady = true;
    window.dispatchEvent(new Event("firebase-ready"));
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--gold:#FFD700;--gold-light:#FFE55C;--gold-dark:#B8960C;--card:rgba(0,0,0,0.58);--border:rgba(255,215,0,0.13);--text:#f0f0f0;--muted:#6a8a6a;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0f1a0f;color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;}
    .cage-bg{min-height:100vh;background-color:#0f1a0f;background-image:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,0.055) 18px,rgba(255,255,255,0.055) 19px),repeating-linear-gradient(90deg,transparent,transparent 18px,rgba(255,255,255,0.055) 18px,rgba(255,255,255,0.055) 19px);position:relative;}
    .cage-bg::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,80,0,0.65) 0%,transparent 60%),radial-gradient(ellipse at 0% 50%,rgba(0,0,0,0.55) 0%,transparent 50%),radial-gradient(ellipse at 100% 50%,rgba(0,0,0,0.55) 0%,transparent 50%);}
    .cage-inner{position:relative;z-index:1;padding-bottom:85px;}
    .cage-frame{height:7px;background:repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 4px,transparent 4px,transparent 16px);opacity:0.5;}
    .hdr{display:flex;justify-content:space-between;align-items:center;padding:13px 17px;border-bottom:1px solid rgba(255,215,0,0.18);background:rgba(0,0,0,0.52);position:relative;z-index:2;}
    .logo{display:flex;align-items:center;gap:10px;}
    .logo-text{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);}
    .logo-sub{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
    .hdr-btn{background:var(--gold);color:#000;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}
    .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(4,8,4,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,215,0,0.12);display:flex;justify-content:space-around;padding:7px 0 14px;z-index:100;}
    .ntab{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 10px;color:#3a5a3a;font-size:9px;font-family:'Barlow',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
    .ntab.active{color:var(--gold);}
    .ntab span{font-size:17px;}
    .screen{display:none;padding:16px 16px 10px;max-width:480px;margin:0 auto;}
    .screen.active{display:block;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px;margin-bottom:11px;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.2s,transform 0.15s;}
    .card:hover{border-color:rgba(255,215,0,0.3);transform:translateY(-1px);}
    .btn-gold{background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gold-dark));color:#000;border:none;border-radius:10px;padding:13px;width:100%;font-size:14px;font-weight:800;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1.5px;box-shadow:0 4px 20px rgba(255,215,0,0.25);margin-bottom:8px;}
    .btn-dark{background:rgba(0,0,0,0.48);color:var(--muted);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px;width:100%;font-size:13px;cursor:pointer;font-family:'Barlow',sans-serif;margin-bottom:8px;}
    .btn-danger{background:rgba(40,0,0,0.6);color:#ff5252;border:1px solid rgba(255,82,82,0.2);border-radius:10px;padding:12px;width:100%;font-size:13px;cursor:pointer;font-family:'Barlow',sans-serif;margin-bottom:8px;}
    .badge{display:inline-block;font-size:10px;font-weight:700;color:var(--gold-dark);background:rgba(255,215,0,0.1);border-radius:20px;padding:3px 9px;font-family:'Barlow Condensed',sans-serif;}
    .gold{color:var(--gold);}
    .muted{color:var(--muted);font-size:12px;}
    .sec-title{font-family:'Playfair Display',serif;font-size:22px;color:#fff;margin-bottom:12px;}
    .sec-title span{color:var(--gold);}
    .bar-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;}
    .bar{background:rgba(255,255,255,0.08);border-radius:99px;height:4px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold-dark),var(--gold));}
    .meta{display:flex;gap:14px;font-size:11px;color:var(--muted);margin:7px 0;}
    .filter-row{display:flex;gap:6px;margin-bottom:13px;flex-wrap:wrap;}
    .chip{font-size:11px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:5px 12px;cursor:pointer;background:rgba(0,0,0,0.38);color:var(--muted);font-family:'Barlow',sans-serif;}
    .chip.active{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,0.08);}
    .back-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:13px;display:flex;align-items:center;gap:4px;padding:0;font-family:'Barlow',sans-serif;}
    .avatar-circle{width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,#1a3a1a,#0a2a0a);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:24px;font-weight:800;color:var(--gold);font-family:'Barlow Condensed',sans-serif;}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0;}
    .stat-card{background:rgba(0,0,0,0.5);border:1px solid rgba(255,215,0,0.1);border-radius:10px;padding:10px 8px;text-align:center;}
    .stat-n{font-size:20px;font-weight:800;color:var(--gold);font-family:'Barlow Condensed',sans-serif;}
    .stat-l{font-size:10px;color:var(--muted);margin-top:2px;}
    .badges-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px;}
    .achieve{background:rgba(255,215,0,0.07);border:1px solid rgba(255,215,0,0.18);border-radius:10px;padding:10px 8px;text-align:center;flex:1;min-width:58px;}
    .achieve-icon{font-size:22px;margin-bottom:4px;}
    .achieve-name{font-size:10px;color:var(--gold);}
    .achieve-locked{opacity:0.28;filter:grayscale(1);}
    .pitch-view{background:#1a4a1a;border:1px solid #2a6a2a;border-radius:12px;padding:12px 10px;margin:10px 0;text-align:center;}
    .frow{display:flex;justify-content:center;gap:14px;margin:6px 0;}
    .pdot{width:33px;height:33px;border-radius:50%;background:rgba(0,0,0,0.6);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-weight:800;}
    .pdot.empty{border-style:dashed;border-color:#2a5a2a;color:#2a5a2a;}
    .map-box{background:#0a1a0a;border:1px solid rgba(255,215,0,0.15);border-radius:12px;height:130px;position:relative;overflow:hidden;margin-bottom:10px;}
    .map-grid{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 20px,rgba(255,255,255,0.04) 20px,rgba(255,255,255,0.04) 21px),repeating-linear-gradient(90deg,transparent,transparent 20px,rgba(255,255,255,0.04) 20px,rgba(255,255,255,0.04) 21px);}
    .map-pin{position:absolute;width:18px;height:18px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);cursor:pointer;}
    .map-pin::after{content:'';position:absolute;width:7px;height:7px;background:#000;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
    .chat-bubble{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.07);border-radius:10px 10px 10px 2px;padding:9px 12px;margin-bottom:8px;max-width:82%;}
    .chat-bubble.mine{background:rgba(255,215,0,0.1);border-color:rgba(255,215,0,0.2);border-radius:10px 10px 2px 10px;margin-left:auto;}
    .chat-name{font-size:10px;color:var(--gold);margin-bottom:3px;font-weight:700;}
    .chat-text{font-size:13px;color:#ddd;}
    .chat-time{font-size:10px;color:#3a5a3a;margin-top:3px;text-align:right;}
    .ai-card{background:rgba(255,215,0,0.04);border:1px solid rgba(255,215,0,0.18);border-radius:12px;padding:14px;margin-bottom:10px;}
    .ai-label{font-size:10px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;font-family:'Barlow Condensed',sans-serif;}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#000;padding:11px 22px;border-radius:12px;font-weight:800;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;z-index:999;font-size:14px;box-shadow:0 8px 32px rgba(255,215,0,0.35);white-space:nowrap;}
    .field{margin-bottom:13px;}
    .field label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;font-family:'Barlow Condensed',sans-serif;}
    input,textarea,select{font-family:'Barlow',sans-serif;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:8px;padding:11px 13px;width:100%;font-size:13px;outline:none;}
    input:focus,textarea:focus,select:focus{border-color:var(--gold);}
    select option{background:#0f1a0f;}
    .error-box{background:rgba(255,0,0,0.08);border:1px solid rgba(255,82,82,0.3);border-radius:10px;padding:12px;color:#ff5252;font-size:13px;margin-bottom:14px;}
    .spinner{width:36px;height:36px;border:3px solid rgba(255,215,0,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:#2a4a2a;border-radius:3px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    .fade-up{animation:fadeUp 0.35s ease forwards;}
    @keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
    .gold-shimmer{background:linear-gradient(90deg,var(--gold-dark),var(--gold-light),var(--gold-dark));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

function Ball({size=44}) {
  const id="bc"+size;
  return (
    <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
      <defs><clipPath id={id}><circle cx="22" cy="22" r="20"/></clipPath></defs>
      <circle cx="22" cy="22" r="20" fill="#f5f5f5"/>
      <polygon points="22,5 28,11 26,18 22,20 18,18 16,11" fill="#111" clipPath={"url(#"+id+")"}/>
      <polygon points="28,11 36,10 39,18 33,23 26,18" fill="#111" clipPath={"url(#"+id+")"}/>
      <polygon points="33,23 39,18 41,27 37,33 30,30" fill="#111" clipPath={"url(#"+id+")"}/>
      <polygon points="26,18 30,30 26,36 18,36 14,30 18,18" fill="#111" clipPath={"url(#"+id+")"}/>
      <polygon points="18,18 14,30 7,27 5,18 11,13" fill="#111" clipPath={"url(#"+id+")"}/>
      <polygon points="16,11 11,13 5,18 6,10 14,6" fill="#111" clipPath={"url(#"+id+")"}/>
      <circle cx="22" cy="22" r="20" fill="none" stroke="rgba(255,215,0,0.45)" strokeWidth="1.5"/>
      <ellipse cx="15" cy="13" rx="4" ry="2.5" fill="white" opacity="0.4" transform="rotate(-30 15 13)" clipPath={"url(#"+id+")"}/>
    </svg>
  );
}

const FMT_SLOTS={"5-a-side":10,"7-a-side":14,"11-a-side":22};
const PRICE=9;
const VENUES=["Powerleague Shoreditch, EC2A","Goals Soccer Wimbledon, SW19","Hackney Marshes, E9","Goals Soccer Beckton, E6","Powerleague Fulham, SW6","Astro Wembley, HA9","Urban Football Stratford, E20","Powerleague Camden, NW1"];

function App() {
  const [fbReady,setFbReady]=useState(window._gbReady||false);
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [screen,setScreen]=useState("home");
  const [games,setGames]=useState([]);
  const [selected,setSelected]=useState(null);
  const [filter,setFilter]=useState("All");
  const [toast,setToast]=useState(null);
  const [payScreen,setPayScreen]=useState(false);
  const [payMethod,setPayMethod]=useState(null);
  const [payDone,setPayDone]=useState(false);
  const [authMode,setAuthMode]=useState("login");
  const [authForm,setAuthForm]=useState({name:"",email:"",password:""});
  const [authError,setAuthError]=useState("");
  const [newGame,setNewGame]=useState({title:"",format:"5-a-side",location:"",date:"",time:"",notes:""});
  const [chatMsg,setChatMsg]=useState("");
  const [chatMsgs,setChatMsgs]=useState([
    {name:"Marcus T.",text:"Everyone confirmed for Saturday? Bibs sorted!",time:"11:20",mine:false},
    {name:"Dev P.",text:"I'm in. Bringing extra water 💧",time:"11:24",mine:false},
    {name:"You",text:"See you all there! Ready to run ⚽",time:"11:31",mine:true},
  ]);
  const [socialTab,setSocialTab]=useState("ratings");
  const [ratings,setRatings]=useState({});

  useEffect(()=>{
    if(window._gbReady){initFb();return;}
    window.addEventListener("firebase-ready",()=>{setFbReady(true);initFb();});
  },[]);

  function initFb(){
    const {onAuthStateChanged}=window._gbAuthFns;
    const auth=window._gbAuth;
    onAuthStateChanged(auth,async(u)=>{
      if(u){setUser(u);loadGames();}
      else{setUser(null);}
      setLoading(false);
    });
  }

  function loadGames(){
    const {collection,onSnapshot,query,orderBy}=window._gbFirestore;
    const db=window._gbDb;
    try{
      const q=query(collection(db,"games"),orderBy("createdAt","desc"));
      onSnapshot(q,(snap)=>{
        setGames(snap.docs.map(d=>({id:d.id,...d.data()})));
      });
    }catch(e){console.log("Loading games:",e);}
  }

  async function handleAuth(){
    setAuthError("");
    const auth=window._gbAuth;
    const {createUserWithEmailAndPassword,signInWithEmailAndPassword,updateProfile}=window._gbAuthFns;
    try{
      if(authMode==="signup"){
        if(!authForm.name.trim())return setAuthError("Please enter your name.");
        if(!authForm.email.trim())return setAuthError("Please enter your email.");
        if(authForm.password.length<6)return setAuthError("Password must be at least 6 characters.");
        const cred=await createUserWithEmailAndPassword(auth,authForm.email,authForm.password);
        await updateProfile(cred.user,{displayName:authForm.name});
        showToast("Welcome to Golden Boot, "+authForm.name+"! 🏆");
        loadGames();
        go("games");
      }else{
        await signInWithEmailAndPassword(auth,authForm.email,authForm.password);
        showToast("Welcome back! 🏆");
        loadGames();
        go("games");
      }
    }catch(e){
      const msgs={"auth/email-already-in-use":"That email is already registered.","auth/invalid-email":"Please enter a valid email.","auth/weak-password":"Password must be at least 6 characters.","auth/user-not-found":"No account found. Please sign up.","auth/wrong-password":"Incorrect password.","auth/invalid-credential":"Email or password is incorrect."};
      setAuthError(msgs[e.code]||"Something went wrong. Please try again.");
    }
  }

  async function handleSignOut(){
    const {signOut}=window._gbAuthFns;
    await signOut(window._gbAuth);
    setGames([]);
    showToast("Signed out! 👋");
    go("home");
  }

  async function createGame(){
    if(!newGame.title||!newGame.location||!newGame.date||!newGame.time)return showToast("Please fill in all fields.");
    if(!user)return showToast("Please sign in first!");
    const {collection,addDoc,serverTimestamp}=window._gbFirestore;
    const db=window._gbDb;
    try{
      await addDoc(collection(db,"games"),{
        ...newGame,price:PRICE,host:user.displayName||user.email,hostUid:user.uid,
        players:[{name:user.displayName||user.email,uid:user.uid,pos:"Player",level:"Casual"}],
        createdAt:serverTimestamp(),
      });
      setNewGame({title:"",format:"5-a-side",location:"",date:"",time:"",notes:""});
      showToast("Game created! Share the app with friends! 🏟️");
      go("games");
    }catch(e){showToast("Error creating game. Try again.");}
  }

  async function joinGame(game){
    if(!user){go("auth");return;}
    if((game.players||[]).find(p=>p.uid===user.uid))return showToast("You're already in this game!");
    if(spots(game)<=0)return showToast("This game is full!");
    const {doc,updateDoc,arrayUnion}=window._gbFirestore;
    const db=window._gbDb;
    try{
      await updateDoc(doc(db,"games",game.id),{
        players:arrayUnion({name:user.displayName||user.email,uid:user.uid,pos:"Player",level:"Casual"})
      });
      setPayDone(true);
      setTimeout(()=>{setPayScreen(false);setPayDone(false);},2200);
      showToast("You're in! See you on the pitch 🏆");
    }catch(e){showToast("Error joining. Try again.");}
  }

  function sendChat(){
    if(!chatMsg.trim())return;
    const t=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    setChatMsgs([...chatMsgs,{name:"You",text:chatMsg,time:t,mine:true}]);
    setChatMsg("");
  }

  function go(s){setScreen(s);window.scrollTo(0,0);}
  function showToast(m){setToast(m);setTimeout(()=>setToast(null),2500);}
  const spots=g=>FMT_SLOTS[g.format]-((g.players||[]).length);
  const filtered=filter==="All"?games:games.filter(g=>g.format===filter);
  const isJoined=game=>user&&(game.players||[]).find(p=>p.uid===user.uid);

  if(loading) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,background:"#0f1a0f"}}>
      <Ball size={60}/>
      <div className="spinner"/>
      <div style={{color:"var(--muted)",fontSize:13}}>Loading Golden Boot...</div>
    </div>
  );

  if(payDone) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20,background:"#0f1a0f"}}>
      <Ball size={90}/>
      <div className="gold-shimmer" style={{fontFamily:"'Playfair Display',serif",fontSize:36}}>You're In!</div>
      <div style={{color:"var(--muted)"}}>See you on the pitch!</div>
      <button className="btn-gold" style={{width:"auto",padding:"12px 28px",marginTop:10}} onClick={()=>{setPayScreen(false);setPayDone(false);go("games");}}>Back to Games</button>
    </div>
  );

  if(payScreen&&selected) return (
    <div style={{minHeight:"100vh",background:"#0f1a0f",padding:"24px 18px 40px",maxWidth:480,margin:"0 auto"}}>
      {toast&&<div className="toast">{toast}</div>}
      <button className="back-btn" onClick={()=>setPayScreen(false)}>← Back</button>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,marginBottom:4}}>Secure <span className="gold">Checkout</span></div>
      <div style={{color:"var(--muted)",fontSize:13,marginBottom:20}}>Join: {selected.title}</div>
      <div style={{background:"rgba(0,0,0,0.5)",border:"1px solid rgba(255,215,0,0.15)",borderRadius:12,padding:16,marginBottom:20}}>
        {[["Game",selected.title],["Venue",selected.location],["Format",selected.format],["Date & Time",selected.date+" at "+selected.time]].map(([k,v])=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
            <span style={{color:"var(--muted)"}}>{k}</span>
            <span style={{fontWeight:500,textAlign:"right",maxWidth:"60%"}}>{v}</span>
          </div>
        ))}
        <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:10,marginTop:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:1}}>TOTAL DUE</span>

              <div className="card">
                {[{name:"Marcus T.",pos:"Striker"},{name:"Dev P.",pos:"Goalkeeper"},{name:"Liam O.",pos:"Midfielder"}].map(p=>(
                  <div key={p.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                    <div><div style={{fontSize:13,color:"#eee",fontWeight:600}}>{p.name}</div><div className="muted">{p.pos}</div></div>
                    <div style={{display:"flex",gap:3}}>
                      {[0,1,2,3,4].map(i=>(
                        <span key={i} onClick={()=>setRatings({...ratings,[p.name]:i+1})} style={{fontSize:18,cursor:"pointer",color:ratings[p.name]&&ratings[p.name]>i?"var(--gold)":"#2a4a2a",lineHeight:1}}>★</span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              <button className="btn-gold" style={{marginTop:14}} onClick={()=>showToast("Ratings submitted! 🏆")}>Submit Ratings</button>
            </>
          )}
          {socialTab==="feed"&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div style={{background:"rgba(0,0,0,0.5)",border:"1px solid rgba(255,215,0,0.1)",borderRadius:10,height:90,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:5,cursor:"pointer"}} onClick={()=>showToast("Photo upload coming soon! 📷")}>
                <span style={{fontSize:22}}>📷</span>
                <div className="muted">Add photo</div>
              </div>
              {[{emoji:"⚽",title:"Shoreditch 5s",date:"10 May"},{emoji:"🏆",title:"Wembley 7s",date:"8 May"},{emoji:"🌧️",title:"Hackney 11s",date:"5 May"}].map(f=>(
                <div key={f.title} style={{background:"rgba(30,60,30,0.4)",border:"1px solid rgba(255,215,0,0.1)",borderRadius:10,height:90,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:4}}>
                  <span style={{fontSize:22}}>{f.emoji}</span>
                  <div style={{fontSize:11,color:"var(--gold)",fontWeight:600}}>{f.title}</div>
                  <div className="muted">{f.date}</div>
                </div>
              ))}
            </div>
          )}
          {socialTab==="leaderboard"&&(
            <>
              <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:10,fontFamily:"'Barlow Condensed',sans-serif"}}>Top Trust Scores</div>
              {[{name:"Marcus T.",score:"9.4",pos:"Striker",g:31},{name:"Jamie R.",score:"8.9",pos:"Defender",g:24},{name:"Tobi A.",score:"8.7",pos:"Goalkeeper",g:19}].map((p,i)=>(
                <div key={p.name} className="card" style={{padding:"11px 13px",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:i===0?"var(--gold)":i===1?"#aaa":"#cd7f32",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#000",flexShrink:0}}>{i+1}</div>
                  <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,var(--gold-dark),var(--gold))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#000",flexShrink:0}}>{p.name.charAt(0)}</div>
                  <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13,color:"#eee"}}>{p.name}</div><div className="muted">{p.pos} · {p.g} games</div></div>
                  <span className="gold" style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:800}}>{p.score} ⭐</span>
                </div>
              ))}
            </>
          )}
        </div>

        {/* CHAT */}
        <div className={"screen fade-up"+(screen==="chat"?" active":"")} id="s-chat">
          <button className="back-btn" onClick={()=>go("gamedetail")}>← Back</button>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#fff",marginBottom:14}}>Group <span className="gold">Chat</span></div>
          <div style={{marginBottom:12}}>
            {chatMsgs.map((m,i)=>(
              <div key={i} className={"chat-bubble"+(m.mine?" mine":"")}>
                {!m.mine&&<div className="chat-name">{m.name}</div>}
                <div className="chat-text">{m.text}</div>
                <div className="chat-time">{m.time}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <input placeholder="Type a message..." value={chatMsg} onChange={e=>setChatMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} style={{flex:1}}/>
            <button onClick={sendChat} style={{background:"var(--gold)",color:"#000",border:"none",borderRadius:8,padding:"10px 14px",cursor:"pointer",fontSize:14,fontWeight:700}}>→</button>
          </div>
        </div>

        {/* AI */}
        <div className={"screen fade-up"+(screen==="ai"?" active":"")} id="s-ai">
          <div className="sec-title">✨ <span>AI</span> Assistant</div>
          <div className="ai-card">
            <div className="ai-label">🎯 Smart Recommendation</div>
            <div style={{fontSize:13,color:"#ddd",lineHeight:1.7}}>Based on your skill level, we recommend joining a <span className="gold">5-a-side</span> game this week. 3 players at your level are looking for games nearby.</div>
          </div>
          <div className="ai-card">
            <div className="ai-label">📈 Performance Trends</div>
            <div style={{fontSize:12,color:"#aaa",marginBottom:10}}>Your last 5 games</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:5,height:54,marginBottom:8}}>
              {[60,75,65,85,100].map((h,i)=>(
                <div key={i} style={{flex:1,background:`rgba(255,215,0,${0.2+i*0.16})`,borderRadius:"3px 3px 0 0",height:h+"%"}}/>
              ))}
            </div>
            <div style={{fontSize:11,color:"var(--muted)"}}>Rating improving — up <span className="gold">+0.6</span> this month 📈</div>
          </div>
          <div className="ai-card">
            <div className="ai-label">⚖️ Auto-Balanced Teams</div>
            <div style={{fontSize:13,color:"#ddd",lineHeight:1.7}}>AI has balanced teams by skill score. Average difference: <span className="gold">0.2 points</span> — fairest split possible.</div>
          </div>
        </div>

        {/* PROFILE */}
        <div className={"screen fade-up"+(screen==="profile"?" active":"")} id="s-profile">
          {!user?(
            <div style={{textAlign:"center",padding:"40px 20px"}}>
              <Ball size={60}/>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#fff",marginTop:16,marginBottom:8}}>Sign in to see your profile</div>
              <button className="btn-gold" style={{marginTop:16}} onClick={()=>go("auth")}>Sign In / Sign Up 🏆</button>
            </div>
          ):(
            <>
              <div style={{textAlign:"center",padding:"16px 0 12px"}}>
                <div className="avatar-circle">{(user.displayName||user.email||"?").charAt(0).toUpperCase()}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#fff"}}>{user.displayName||user.email}</div>
                <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>{user.email}</div>
              </div>
              <div className="stats-grid">
                {[{n:games.filter(g=>(g.players||[]).find(p=>p.uid===user.uid)).length.toString(),l:"My Games"},{n:"4.8",l:"Avg Rating"},{n:"8.7",l:"Trust Score"}].map(s=>(
                  <div key={s.l} className="stat-card"><div className="stat-n">{s.n}</div><div className="stat-l">{s.l}</div></div>
                ))}
              </div>
              <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif"}}>Achievements</div>
              <div className="badges-row">
                {[{icon:"🏆",name:"Golden Boot"},{icon:"⚡",name:"Hat-trick"},{icon:"🤝",name:"Good Sport"},{icon:"👑",name:"Legend",locked:true},{icon:"🔥",name:"10 Streak",locked:true}].map(a=>(
                  <div key={a.name} className={"achieve"+(a.locked?" achieve-locked":"")}>
                    <div className="achieve-icon">{a.icon}</div>
                    <div className="achieve-name">{a.name}</div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif"}}>My Games</div>
              {games.filter(g=>(g.players||[]).find(p=>p.uid===user.uid)).map(g=>(
                <div key={g.id} className="card" style={{padding:"10px 13px"}} onClick={()=>{setSelected(g);go("gamedetail");}}>
                  <div style={{fontWeight:600,fontSize:13,color:"#eee"}}>{g.title}</div>
                  <div className="muted" style={{marginTop:3}}>📅 {g.date} · {g.format}</div>
                </div>
              ))}
              {games.filter(g=>(g.players||[]).find(p=>p.uid===user.uid)).length===0&&<div style={{color:"var(--muted)",fontSize:13,textAlign:"center",padding:"20px 0"}}>No games yet — browse and join one! ⚽</div>}
              <div style={{background:"rgba(255,215,0,0.05)",border:"1px solid rgba(255,215,0,0.15)",borderRadius:14,padding:16,marginBottom:16,marginTop:8}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,color:"var(--gold)",letterSpacing:1,marginBottom:6}}>🔗 SHARE GOLDEN BOOT</div>
                <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.7}}>Share <strong style={{color:"#fff"}}>kickoff-app-ar55.vercel.app</strong> with friends so they can sign up and join your games!</div>
              </div>
              <button className="btn-danger" onClick={handleSignOut}>Sign Out</button>
            </>
          )}
        </div>

        {/* NAV */}
        <div className="nav">
          {[{id:"home",icon:"🏠",label:"Home"},{id:"games",icon:"⚽",label:"Games"},{id:"booking",icon:"📍",label:"Pitches"},{id:"social",icon:"👥",label:"Social"},{id:"ai",icon:"✨",label:"AI"},{id:"profile",icon:"👤",label:"Profile"}].map(tab=>(
            <button key={tab.id} className={"ntab"+(screen===tab.id||screen==="gamedetail"&&tab.id==="games"||screen==="create"&&tab.id==="games"||screen==="chat"&&tab.id==="social"||screen==="auth"&&tab.id==="profile"?" active":"")} onClick={()=>go(tab.id)}>
              <span>{tab.icon}</span>{tab.label}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
