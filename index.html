// Haversine distance formula
function getDistance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

  {id:10,name:"Goals Soccer Tottenham",area:"Tottenham",postcode:"N17 0AP",address:"Northumberland Park, N17 0AP",phone:"02088083211",website:"https://www.goals.co.uk",types:["5-a-side","7-a-side"],price:"From £32/hr",rating:4.4,indoor:false,astro:true,parking:true,lat:51.6016,lng:-0.0623,notes:"Affordable pitches in North London."},

  {id:12,name:"Powerleague Tottenham",area:"Tottenham",postcode:"N17 9BH",address:"White Hart Lane, N17 9BH",phone:"02088089090",website:"https://www.powerleague.co.uk/clubs/tottenham",types:["5-a-side","7-a-side"],price:"From £38/hr",rating:4.5,indoor:true,astro:true,parking:true,lat:51.6033,lng:-0.0680,notes:"Near Spurs stadium. Indoor floodlit pitches."},
];

function App() {
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [screen,setScreen]=useState("home");
  const [games,setGames]=useState([]);
  const [selected,setSelected]=useState(null);
  const [filter,setFilter]=useState("All");
  const [toast,setToast]=useState(null);
  const [payScreen,setPayScreen]=useState(false);
  const [payMethod,setPayMethod]=useState(null);
  const [payDone,setPayDone]=useState(false);
  const [authMode,setAuthMode]=useState("login");
  const [authForm,setAuthForm]=useState({name:"",email:"",password:""});
  const [authError,setAuthError]=useState("");
  const [termsAgreed,setTermsAgreed]=useState(false);
  const [newGame,setNewGame]=useState({title:"",format:"5-a-side",location:"",date:"",time:"",notes:""});
  const [socialTab,setSocialTab]=useState("ratings");
  const [ratings,setRatings]=useState({});
  const [pitchFilter,setPitchFilter]=useState("All");
  const [pitchSearch,setPitchSearch]=useState("");
  // GPS
  const [userLocation,setUserLocation]=useState(null);
  const [gpsLoading,setGpsLoading]=useState(false);
  const [gpsError,setGpsError]=useState("");
  // Postcode fallback
  const [postcode,setPostcode]=useState("");
  const [postcodeArea,setPostcodeArea]=useState(null);
  const [postcodeSearched,setPostcodeSearched]=useState(false);
  // Real Firebase chat
  const [chatMsgs,setChatMsgs]=useState([]);
  const [chatMsg,setChatMsg]=useState("");
  const [chatLoading,setChatLoading]=useState(false);
  const chatUnsubRef=useRef(null);
  const chatEndRef=useRef(null);
  // POTM voting
  const [potmVote,setPotmVote]=useState(null);

  useEffect(()=>{
    if(window._gbReady){initFb();return;}
    window.addEventListener("firebase-ready",()=>initFb());
  },[]);

  function initFb(){
    const {onAuthStateChanged}=window._gbAuthFns;
    onAuthStateChanged(window._gbAuth,u=>{
      if(u){setUser(u);loadGames();}
      else{setUser(null);}
      setLoading(false);
    });
  }

  function loadGames(){
    const {collection,onSnapshot,query,orderBy}=window._gbFirestore;
    const db=window._gbDb;
    try{
      const q=query(collection(db,"games"),orderBy("createdAt","desc"));
      onSnapshot(q,snap=>{setGames(snap.docs.map(d=>({id:d.id,...d.data()})));});
    }catch(e){console.log(e);}
  }

  // Real Firebase chat listener
  function openChat(gameId){
    if(chatUnsubRef.current){chatUnsubRef.current();}
    setChatMsgs([]);setChatLoading(true);
    const {collection,onSnapshot,query,orderBy}=window._gbFirestore;
    const db=window._gbDb;
    try{
      const q=query(collection(db,"games",gameId,"messages"),orderBy("createdAt","asc"));
      chatUnsubRef.current=onSnapshot(q,snap=>{
        setChatMsgs(snap.docs.map(d=>({id:d.id,...d.data()})));
        setChatLoading(false);
        setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
      });
    }catch(e){setChatLoading(false);}
    go("chat");
  }

  async function sendChat(){
    if(!chatMsg.trim()||!selected||!user)return;
    const {collection,addDoc,serverTimestamp}=window._gbFirestore;
    const db=window._gbDb;
    const text=chatMsg.trim();
    setChatMsg("");
    try{
      await addDoc(collection(db,"games",selected.id,"messages"),{
        text,uid:user.uid,name:user.displayName||user.email,
        createdAt:serverTimestamp()
      });
    }catch(e){showToast("Error sending message");}
  }

  async function handleAuth(){
    setAuthError("");
    const auth=window._gbAuth;
    const {createUserWithEmailAndPassword,signInWithEmailAndPassword,updateProfile}=window._gbAuthFns;
    try{
      if(authMode==="signup"){
        if(!authForm.name.trim())return setAuthError("Please enter your name.");
        if(!authForm.email.trim())return setAuthError("Please enter your email.");
        if(authForm.password.length<6)return setAuthError("Password must be at least 6 characters.");
        if(!termsAgreed)return setAuthError("Please agree to the Terms & Conditions and Privacy Policy to continue.");
        const cred=await createUserWithEmailAndPassword(auth,authForm.email,authForm.password);
        await updateProfile(cred.user,{displayName:authForm.name});
        showToast("Welcome to Golden Boot, "+authForm.name+"! 🏆");
        if(window.trackEvent)window.trackEvent('sign_up',{method:'email'});
        loadGames();go("games");
      }else{
        await signInWithEmailAndPassword(auth,authForm.email,authForm.password);
        showToast("Welcome back! 🏆");if(window.trackEvent)window.trackEvent('login',{method:'email'});loadGames();go("games");
      }
    }catch(e){
      const msgs={"auth/email-already-in-use":"That email is already registered.","auth/invalid-email":"Please enter a valid email.","auth/weak-password":"Password must be at least 6 characters.","auth/user-not-found":"No account found. Please sign up.","auth/wrong-password":"Incorrect password.","auth/invalid-credential":"Email or password is incorrect."};
      setAuthError(msgs[e.code]||"Something went wrong. Please try again.");
    }
  }

  async function handleSignOut(){
    await window._gbAuthFns.signOut(window._gbAuth);
    setGames([]);showToast("Signed out! 👋");go("home");
  }

  async function createGame(){
    if(!newGame.title||!newGame.location||!newGame.date||!newGame.time)return showToast("Please fill in all fields.");
    if(!user)return showToast("Please sign in first!");
    const {collection,addDoc,serverTimestamp}=window._gbFirestore;
    try{
      await addDoc(collection(window._gbDb,"games"),{
        ...newGame,price:PRICE,host:user.displayName||user.email,hostUid:user.uid,
        players:[{name:user.displayName||user.email,uid:user.uid,pos:"Player",level:"Casual"}],
        waitlist:[],potmVotes:{},status:"active",
        createdAt:serverTimestamp(),
      });
      setNewGame({title:"",format:"5-a-side",location:"",date:"",time:"",notes:""});
      showToast("Game created! 🏟️");if(window.trackEvent)window.trackEvent('game_created',{format:newGame.format,location:newGame.location});go("games");
    }catch(e){showToast("Error creating game. Please try again.");}
  }

  async function joinGame(game){
    if(!user){go("auth");return;}
    if((game.players||[]).find(p=>p.uid===user.uid))return showToast("You're already in this game!");
    if(spots(game)<=0)return showToast("This game is full — join the waitlist!");
    const {doc,updateDoc,arrayUnion}=window._gbFirestore;
    try{
      await updateDoc(doc(window._gbDb,"games",game.id),{
        players:arrayUnion({name:user.displayName||user.email,uid:user.uid,pos:"Player",level:"Casual"})
      });
      setPayDone(true);
      setTimeout(()=>{setPayScreen(false);setPayDone(false);},2200);
      showToast("You're in! See you on the pitch 🏆");if(window.trackEvent)window.trackEvent('join_game',{game_title:game.title,format:game.format});
      // Set pre-match reminder
      scheduleReminder(game);
    }catch(e){showToast("Error joining. Try again.");}
  }

  async function joinWaitlist(game){
    if(!user){go("auth");return;}
    if((game.waitlist||[]).find(p=>p.uid===user.uid))return showToast("You're already on the waitlist!");
    const {doc,updateDoc,arrayUnion}=window._gbFirestore;
    try{
      await updateDoc(doc(window._gbDb,"games",game.id),{
        waitlist:arrayUnion({name:user.displayName||user.email,uid:user.uid})
      });
      showToast("Added to waitlist! We'll notify you if a spot opens. ⏳");if(window.trackEvent)window.trackEvent('join_waitlist',{game_title:game.title});
    }catch(e){showToast("Error joining waitlist.");}
  }

  async function cancelGame(game){
    if(!user||user.uid!==game.hostUid)return showToast("Only the host can cancel this game.");
    if(!window.confirm("Are you sure you want to cancel this game? All players will be notified."))return;
    const {doc,updateDoc}=window._gbFirestore;
    try{
      await updateDoc(doc(window._gbDb,"games",game.id),{status:"cancelled",cancelledAt:new Date().toISOString()});
      showToast("Game cancelled. Players will see refund notice. 🔴");
    }catch(e){showToast("Error cancelling game.");}
  }

  async function voteForPOTM(game,playerName){
    if(!user)return showToast("Please sign in to vote!");
    if(playerName===user.displayName)return showToast("You can't vote for yourself!");
    const {doc,updateDoc}=window._gbFirestore;
    const votes={...(game.potmVotes||{})};
    votes[user.uid]=playerName;
    try{
      await updateDoc(doc(window._gbDb,"games",game.id),{potmVotes:votes});
      setPotmVote(playerName);
      showToast("Voted for "+playerName+" as POTM! 🏆");
    }catch(e){showToast("Error submitting vote.");}
  }

  // GPS Location
  function getGPSLocation(){
    if(!navigator.geolocation){setGpsError("GPS not supported on this device.");return;}
    setGpsLoading(true);setGpsError("");
    navigator.geolocation.getCurrentPosition(
      pos=>{
        setUserLocation({lat:pos.coords.latitude,lng:pos.coords.longitude});
        setGpsLoading(false);
        showToast("Location found! Showing nearest games 📍");
      },
      err=>{
        setGpsLoading(false);
        setGpsError("Couldn't get location. Try entering your postcode instead.");
      },
      {timeout:10000,enableHighAccuracy:true}
    );
  }

  // Browser notification reminder
  function scheduleReminder(game){
    if(!("Notification" in window))return;
    Notification.requestPermission().then(perm=>{
      if(perm==="granted"){
        const gameDate=new Date(game.date+"T"+game.time);
        const reminderTime=gameDate.getTime()-24*60*60*1000;
        const now=Date.now();
        if(reminderTime>now){
          const delay=reminderTime-now;
          if(delay<2147483647){
            setTimeout(()=>{
              new Notification("Golden Boot ⚽ Reminder",{
                body:"You have a game tomorrow: "+game.title+" at "+game.time,
                icon:"/favicon.ico"
              });
            },delay);
          }
        }
        showToast("⏰ Pre-match reminder set for 24hrs before kick-off!");
      }
    });
  }

  function requestReminder(game){
    if(!("Notification" in window)){showToast("Notifications not supported on this browser.");return;}
    scheduleReminder(game);
  }

  // Postcode mapping
  const POSTCODE_AREAS={"E1":"East London","E2":"East London","E3":"East London","E6":"Beckton","E8":"Hackney","E9":"Hackney","E20":"Stratford","EC1":"Old Street","EC2":"Shoreditch","N1":"Islington","N17":"Tottenham","NW1":"Camden","NW10":"North London","SE1":"South London","SE15":"Peckham","SW6":"Fulham","SW19":"Wimbledon","W1":"West End","HA9":"Wembley"};
  function getAreaFromPostcode(pc){
    if(!pc)return null;
    const c=pc.trim().toUpperCase().replace(/\s/g,"");
    return POSTCODE_AREAS[c.substring(0,3)]||POSTCODE_AREAS[c.substring(0,2)]||null;
  }

  function searchPostcode(){
    if(!postcode.trim())return showToast("Please enter your postcode!");
    const area=getAreaFromPostcode(postcode);
    setPostcodeArea(area);setPostcodeSearched(true);
    showToast(area?"Showing games near "+area+" 📍":"Showing all games 📍");
  }

  function getSortedGames(){
    let g=filter==="All"?games:games.filter(x=>x.format===filter);
    if(userLocation){
      // Find pitch lat/lng from name
      g=g.map(game=>{
        const pitch=LONDON_PITCHES.find(p=>game.location&&game.location.includes(p.name));
        const dist=pitch?getDistance(userLocation.lat,userLocation.lng,pitch.lat,pitch.lng):999;
        return {...game,_dist:dist};
      }).sort((a,b)=>a._dist-b._dist);
    } else if(postcodeSearched&&postcodeArea){
      g=[...g].sort((a,b)=>{
        const aM=(a.location||"").toLowerCase().includes(postcodeArea.toLowerCase());
        const bM=(b.location||"").toLowerCase().includes(postcodeArea.toLowerCase());
        if(aM&&!bM)return -1;if(!aM&&bM)return 1;return 0;
      });
    }
    return g;
  }

  function getSortedPitches(){
    let p=LONDON_PITCHES;
    if(pitchFilter!=="All")p=p.filter(x=>x.types.includes(pitchFilter));
    if(pitchSearch.trim())p=p.filter(x=>x.name.toLowerCase().includes(pitchSearch.toLowerCase())||x.area.toLowerCase().includes(pitchSearch.toLowerCase())||x.postcode.toLowerCase().includes(pitchSearch.toLowerCase()));
    if(userLocation){
      p=[...p].map(x=>({...x,_dist:getDistance(userLocation.lat,userLocation.lng,x.lat,x.lng)})).sort((a,b)=>a._dist-b._dist);
    }
    return p;
  }

  function go(s){setScreen(s);window.scrollTo(0,0);if(window.trackScreen)window.trackScreen(s);}
  function showToast(m){setToast(m);setTimeout(()=>setToast(null),3000);}
  const spots=g=>FMT_SLOTS[g.format]-((g.players||[]).length);
  const isJoined=game=>user&&(game.players||[]).find(p=>p.uid===user.uid);
  const isOnWaitlist=game=>user&&(game.waitlist||[]).find(p=>p.uid===user.uid);
  const isHost=game=>user&&user.uid===game.hostUid;
  const gameIsOver=game=>{
    try{const d=new Date(game.date+"T"+game.time);return d<new Date();}catch{return false;}
  };
  const getPOTMWinner=game=>{
    const votes=game.potmVotes||{};
    const counts={};
    Object.values(votes).forEach(n=>{counts[n]=(counts[n]||0)+1;});
    return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  };

  if(loading)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,background:"#0f1a0f"}}><Ball size={60}/><div className="spinner"/><div style={{color:"var(--muted)",fontSize:13}}>Loading Golden Boot...</div></div>);

  if(payDone)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20,background:"#0f1a0f"}}><Ball size={90}/><div className="gold-shimmer" style={{fontFamily:"'Playfair Display',serif",fontSize:36}}>You're In!</div><div style={{color:"var(--muted)"}}>See you on the pitch!</div><button className="btn-gold" style={{width:"auto",padding:"12px 28px",marginTop:10}} onClick={()=>{setPayScreen(false);setPayDone(false);go("games");}}>Back to Games</button></div>);

  if(payScreen&&selected){
    const game=games.find(g=>g.id===selected.id)||selected;
    return(
      <div style={{minHeight:"100vh",background:"#0f1a0f",padding:"24px 18px 40px",maxWidth:480,margin:"0 auto"}}>
        {toast&&<div className="toast">{toast}</div>}
        <button className="back-btn" onClick={()=>setPayScreen(false)}>← Back</button>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,marginBottom:4}}>Secure <span className="gold">Checkout</span></div>
        <div style={{color:"var(--muted)",fontSize:13,marginBottom:20}}>Join: {game.title}</div>
        <div style={{background:"rgba(0,0,0,0.5)",border:"1px solid rgba(255,215,0,0.15)",borderRadius:12,padding:16,marginBottom:20}}>
          {[["Game",game.title],["Venue",game.location],["Format",game.format],["Date & Time",game.date+" at "+game.time]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}><span style={{color:"var(--muted)"}}>{k}</span><span style={{fontWeight:500,textAlign:"right",maxWidth:"60%"}}>{v}</span></div>
          ))}
          <div style={{background:"rgba(0,200,100,0.08)",border:"1px solid rgba(0,200,100,0.2)",borderRadius:8,padding:"10px 12px",marginTop:8,fontSize:12,color:"#4aff9a"}}>
            🔄 Refund Policy: If the host cancels, you will receive a full refund within 3-5 business days.
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:10,marginTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:1}}>TOTAL DUE</span>
            <span className="gold" style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:800}}>£{PRICE}.00</span>
          </div>
        </div>
        <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif"}}>Payment Method</div>
        {[{id:"apple",icon:"🍎",label:"Apple Pay",sub:"Pay with Face ID"},{id:"google",icon:"🟢",label:"Google Pay",sub:"Pay with Google account"},{id:"card",icon:"💳",label:"Credit / Debit Card",sub:"Visa, Mastercard, Amex"},{id:"paypal",icon:"🔵",label:"PayPal",sub:"Fast & secure checkout"}].map(m=>(
          <div key={m.id} onClick={()=>setPayMethod(m.id)} style={{background:payMethod===m.id?"rgba(255,215,0,0.06)":"rgba(0,0,0,0.4)",border:`1px solid ${payMethod===m.id?"var(--gold)":"rgba(255,255,255,0.1)"}`,borderRadius:12,padding:14,marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
            <span style={{fontSize:24}}>{m.icon}</span>
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{m.label}</div><div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{m.sub}</div></div>
            {payMethod===m.id&&<div style={{width:20,height:20,background:"var(--gold)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#000"}}>✓</div>}
          </div>
        ))}
        <button className="btn-gold" style={{marginTop:16,fontSize:16,padding:"15px"}} onClick={()=>{if(!payMethod)return showToast("Please select a payment method.");joinGame(game);}}>Pay £{PRICE}.00 — Join Game 🏆</button>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:10}}><span style={{fontSize:12}}>🔒</span><span style={{fontSize:12,color:"var(--muted)"}}>Secured by 256-bit SSL encryption</span></div>
      </div>
    );
  }

  return(
    <div className="cage-bg">
      {toast&&<div className="toast">{toast}</div>}
      <div className="cage-inner">
        <div className="cage-frame"/>
        <div className="hdr">
          <div className="logo"><Ball size={40}/><div><div className="logo-text">Golden Boot</div><div className="logo-sub">Est. 2026 · London</div></div></div>
          {user?(<button className="hdr-btn" onClick={()=>go("profile")}>My Profile</button>):(<button className="hdr-btn" onClick={()=>go("auth")}>Sign In</button>)}
        </div>

        {/* HOME */}
        <div className={"screen fade-up"+(screen==="home"?" active":"")} id="s-home">
          <div style={{textAlign:"center",padding:"18px 0 16px"}}>
            <Ball size={100}/>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,lineHeight:1.2,margin:"12px 0 10px"}}>Find Your<br/><span className="gold-shimmer">Next Game.</span></div>
            <div style={{color:"var(--muted)",fontSize:13,lineHeight:1.7}}>The global street football community.<br/>No team needed — just show up and play.</div>
          </div>
          <div style={{display:"flex",background:"rgba(0,0,0,0.5)",borderRadius:10,border:"1px solid rgba(255,215,0,0.12)",overflow:"hidden",marginBottom:14}}>
            {[{n:"2,400+",l:"Players"},{n:"180+",l:"Games/week"},{n:"32",l:"Cities"}].map((s,i)=>(
              <div key={i} style={{flex:1,padding:"11px 6px",textAlign:"center",borderRight:i<2?"1px solid rgba(255,255,255,0.06)":"none"}}>
                <div className="gold" style={{fontSize:16,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif"}}>{s.n}</div>
                <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>{s.l}</div>
              </div>
            ))}
          </div>
          {!user?(<><button className="btn-gold" onClick={()=>go("auth")}>🏆 Sign Up — It's Free!</button><button className="btn-dark" onClick={()=>go("games")}>Browse Games</button></>):(<><button className="btn-gold" onClick={()=>go("games")}>Browse Games ⚽</button><button className="btn-dark" onClick={()=>go("pitches")}>📍 Find a Pitch Near Me</button></>)}
          <div style={{display:"flex",gap:8,marginTop:4}}>
            {[{icon:"⚽",label:"Games",s:"games"},{icon:"📍",label:"Pitches",s:"pitches"},{icon:"👤",label:"Profile",s:"profile"}].map(item=>(
              <div key={item.s} className="card" style={{flex:1,padding:"12px 8px",textAlign:"center",marginBottom:0}} onClick={()=>go(item.s)}>
                <div style={{fontSize:22}}>{item.icon}</div>
                <div style={{fontSize:11,color:"#aaa",marginTop:5}}>{item.label}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:14,background:"rgba(0,0,0,0.5)",borderLeft:"2px solid var(--gold)",padding:"12px 14px",borderRadius:"0 8px 8px 0"}}>
            <div style={{fontSize:12,fontStyle:"italic",color:"var(--muted)",lineHeight:1.7}}>"The secret is to believe in your dreams, in your potential that you can be like your idols."</div>
            <div style={{fontSize:10,color:"var(--gold)",marginTop:6,letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"}}>— Ronaldinho</div>
          </div>
        </div>

        {/* AUTH */}
        <div className={"screen fade-up"+(screen==="auth"?" active":"")} id="s-auth">
          <div style={{textAlign:"center",padding:"20px 0 16px"}}><Ball size={60}/><div style={{fontFamily:"'Playfair Display',serif",fontSize:26,marginTop:10,color:"#fff"}}>{authMode==="login"?"Welcome Back":"Join Golden Boot"}</div><div style={{color:"var(--muted)",fontSize:13,marginTop:6}}>{authMode==="login"?"Log in to see real games":"Create your free account"}</div></div>
          <div style={{display:"flex",background:"rgba(0,0,0,0.4)",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",overflow:"hidden",marginBottom:20}}>

              <div style={{display:"flex",gap:8}}>
                <a href={"tel:"+pitch.phone} style={{flex:1,textDecoration:"none"}}><button className="btn-sm btn-call" style={{width:"100%"}}>📞 Call</button></a>
                <a href={pitch.website} target="_blank" rel="noopener noreferrer" style={{flex:1,textDecoration:"none"}}><button className="btn-sm btn-book" style={{width:"100%"}}>🌐 Book</button></a>
              </div>
            </div>
          ))}
        </div>

        {/* REAL FIREBASE CHAT */}
        <div className={"screen fade-up"+(screen==="chat"?" active":"")} id="s-chat">
          <button className="back-btn" onClick={()=>go("gamedetail")}>← Back to Game</button>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#fff",marginBottom:4}}>Live <span className="gold">Group Chat</span></div>
          {selected&&<div style={{fontSize:12,color:"var(--muted)",marginBottom:14}}>{selected.title}</div>}
          <div style={{minHeight:200,marginBottom:12}}>
            {chatLoading&&<div style={{textAlign:"center",padding:"30px 0",color:"var(--muted)"}}>Loading messages...</div>}
            {!chatLoading&&chatMsgs.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"var(--muted)"}}>No messages yet — say hello! 👋</div>}
            {chatMsgs.map((m,i)=>{
              const mine=user&&m.uid===user.uid;
              return(
                <div key={m.id||i} className={"chat-msg"+(mine?" chat-mine-wrap":"")}>
                  {!mine&&<div className="chat-name">{m.name}</div>}
                  <div className={"chat-bubble"+(mine?" mine":"")}>
                    <div className="chat-text">{m.text}</div>
                    <div className="chat-time">{m.createdAt?.toDate?new Date(m.createdAt.toDate()).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):""}</div>
                  </div>
                </div>
              );
            })}
            <div ref={chatEndRef}/>
          </div>
          {user?(
            <div style={{display:"flex",gap:8,position:"sticky",bottom:90}}>
              <input placeholder="Type a message..." value={chatMsg} onChange={e=>setChatMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} style={{flex:1}}/>
              <button onClick={sendChat} style={{background:"var(--gold)",color:"#000",border:"none",borderRadius:8,padding:"10px 14px",cursor:"pointer",fontSize:14,fontWeight:700}}>→</button>
            </div>
          ):(
            <div style={{textAlign:"center",padding:"16px 0"}}><button className="btn-gold" onClick={()=>go("auth")}>Sign in to chat 🏆</button></div>
          )}
        </div>

        {/* SOCIAL */}
        <div className={"screen fade-up"+(screen==="social"?" active":"")} id="s-social">
          <div className="sec-title"><span>Social</span> Hub</div>
          <div className="filter-row">
            {["ratings","feed","leaderboard"].map(t=>(<button key={t} className={"chip"+(socialTab===t?" active":"")} onClick={()=>setSocialTab(t)} style={{textTransform:"capitalize"}}>{t}</button>))}
          </div>
          {socialTab==="ratings"&&(
            <>
              <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:10,fontFamily:"'Barlow Condensed',sans-serif"}}>Rate last match</div>
              <div className="card">
                {[{name:"Marcus T.",pos:"Striker"},{name:"Dev P.",pos:"Goalkeeper"},{name:"Liam O.",pos:"Midfielder"}].map(p=>(
                  <div key={p.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                    <div><div style={{fontSize:13,color:"#eee",fontWeight:600}}>{p.name}</div><div className="muted">{p.pos}</div></div>
                    <div style={{display:"flex",gap:3}}>
                      {[0,1,2,3,4].map(i=>(<span key={i} onClick={()=>setRatings({...ratings,[p.name]:i+1})} style={{fontSize:18,cursor:"pointer",color:ratings[p.name]&&ratings[p.name]>i?"var(--gold)":"#2a4a2a",lineHeight:1}}>★</span>))}
                    </div>
                  </div>
                ))}
              </div>
              <button className="btn-gold" style={{marginTop:14}} onClick={()=>showToast("Ratings submitted! 🏆")}>Submit Ratings</button>
            </>
          )}
          {socialTab==="feed"&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div style={{background:"rgba(0,0,0,0.5)",border:"1px solid rgba(255,215,0,0.1)",borderRadius:10,height:90,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:5,cursor:"pointer"}} onClick={()=>showToast("Photo upload coming soon! 📷")}><span style={{fontSize:22}}>📷</span><div className="muted">Add photo</div></div>
              {[{emoji:"⚽",title:"Shoreditch 5s",date:"10 May"},{emoji:"🏆",title:"Wembley 7s",date:"8 May"},{emoji:"🌧️",title:"Hackney 11s",date:"5 May"}].map(f=>(<div key={f.title} style={{background:"rgba(30,60,30,0.4)",border:"1px solid rgba(255,215,0,0.1)",borderRadius:10,height:90,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:4}}><span style={{fontSize:22}}>{f.emoji}</span><div style={{fontSize:11,color:"var(--gold)",fontWeight:600}}>{f.title}</div><div className="muted">{f.date}</div></div>))}
            </div>
          )}
          {socialTab==="leaderboard"&&(
            <>
              <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:10,fontFamily:"'Barlow Condensed',sans-serif"}}>Top Trust Scores</div>
              {[{name:"Marcus T.",score:"9.4",pos:"Striker",g:31},{name:"Jamie R.",score:"8.9",pos:"Defender",g:24},{name:"Tobi A.",score:"8.7",pos:"Goalkeeper",g:19}].map((p,i)=>(
                <div key={p.name} className="card" style={{padding:"11px 13px",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:i===0?"var(--gold)":i===1?"#aaa":"#cd7f32",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#000",flexShrink:0}}>{i+1}</div>
                  <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,var(--gold-dark),var(--gold))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#000",flexShrink:0}}>{p.name.charAt(0)}</div>
                  <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13,color:"#eee"}}>{p.name}</div><div className="muted">{p.pos} · {p.g} games</div></div>
                  <span className="gold" style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:800}}>{p.score} ⭐</span>
                </div>
              ))}
            </>
          )}
        </div>

        {/* AI */}
        <div className={"screen fade-up"+(screen==="ai"?" active":"")} id="s-ai">
          <div className="sec-title">✨ <span>AI</span> Assistant</div>
          <div className="ai-card"><div className="ai-label">🎯 Smart Recommendation</div><div style={{fontSize:13,color:"#ddd",lineHeight:1.7}}>Based on your skill level, we recommend joining a <span className="gold">5-a-side</span> game this week. 3 players at your level are looking for games nearby.</div></div>
          <div className="ai-card"><div className="ai-label">📈 Performance Trends</div><div style={{fontSize:12,color:"#aaa",marginBottom:10}}>Your last 5 games</div><div style={{display:"flex",alignItems:"flex-end",gap:5,height:54,marginBottom:8}}>{[60,75,65,85,100].map((h,i)=>(<div key={i} style={{flex:1,background:`rgba(255,215,0,${0.2+i*0.16})`,borderRadius:"3px 3px 0 0",height:h+"%"}}/>))}</div><div style={{fontSize:11,color:"var(--muted)"}}>Rating improving — up <span className="gold">+0.6</span> this month 📈</div></div>
          <div className="ai-card"><div className="ai-label">⚖️ Auto-Balanced Teams</div><div style={{fontSize:13,color:"#ddd",lineHeight:1.7}}>AI has balanced teams by skill score. Average difference: <span className="gold">0.2 points</span> — fairest split possible.</div></div>
        </div>

        {/* PROFILE */}
        <div className={"screen fade-up"+(screen==="profile"?" active":"")} id="s-profile">
          {!user?(
            <div style={{textAlign:"center",padding:"40px 20px"}}><Ball size={60}/><div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#fff",marginTop:16,marginBottom:8}}>Sign in to see your profile</div><button className="btn-gold" style={{marginTop:16}} onClick={()=>go("auth")}>Sign In / Sign Up 🏆</button></div>
          ):(
            <>
              <div style={{textAlign:"center",padding:"16px 0 12px"}}>
                <div className="avatar-circle">{(user.displayName||user.email||"?").charAt(0).toUpperCase()}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#fff"}}>{user.displayName||user.email}</div>
                <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>{user.email}</div>
              </div>
              <div className="stats-grid">
                {[{n:games.filter(g=>(g.players||[]).find(p=>p.uid===user.uid)).length.toString(),l:"My Games"},{n:"4.8",l:"Avg Rating"},{n:"8.7",l:"Trust Score"}].map(s=>(<div key={s.l} className="stat-card"><div className="stat-n">{s.n}</div><div className="stat-l">{s.l}</div></div>))}
              </div>
              <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif"}}>My Games</div>
              {games.filter(g=>(g.players||[]).find(p=>p.uid===user.uid)).map(g=>(<div key={g.id} className="card" style={{padding:"10px 13px"}} onClick={()=>{setSelected(g);go("gamedetail");}}><div style={{fontWeight:600,fontSize:13,color:"#eee"}}>{g.title}</div><div className="muted" style={{marginTop:3}}>📅 {g.date} · {g.format}</div></div>))}
              {games.filter(g=>(g.players||[]).find(p=>p.uid===user.uid)).length===0&&<div style={{color:"var(--muted)",fontSize:13,textAlign:"center",padding:"20px 0"}}>No games yet — browse and join one! ⚽</div>}
              <div style={{background:"rgba(255,215,0,0.05)",border:"1px solid rgba(255,215,0,0.15)",borderRadius:14,padding:16,marginBottom:16,marginTop:8}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,color:"var(--gold)",letterSpacing:1,marginBottom:6}}>🔗 SHARE GOLDEN BOOT</div>
                <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.7}}>Share <strong style={{color:"#fff"}}>kickoff-app-ar55.vercel.app</strong> with friends!</div>
              </div>
              <button className="btn-danger" onClick={handleSignOut}>Sign Out</button>
            </>
          )}
        </div>

        {/* PRIVACY POLICY SCREEN */}
        <div className={"screen fade-up"+(screen==="privacy"?" active":"")} id="s-privacy">
          <button className="back-btn" onClick={()=>history.back?history.back():go("auth")}>← Back</button>
          <div className="sec-title">Privacy <span>Policy</span></div>
          <div style={{color:"var(--muted)",fontSize:12,marginBottom:16}}>Last updated: July 2026 · Miah & Co Consultancy</div>
          {[
            {t:"1. Who We Are",b:"Golden Boot is operated by Miah & Co Consultancy, London, UK. Contact: miahtechlimited@outlook.com"},
            {t:"2. What Data We Collect",b:"We collect your name, email, game data, chat messages, GPS location (only when you choose), and payment status via Stripe. We never store card numbers."},
            {t:"3. How We Use Your Data",b:"To run your account, show you nearby games, process payments, send reminders and improve the app. We will never sell your data to third parties."},
            {t:"4. Legal Basis (UK GDPR)",b:"We process your data under Contract (to provide our service), Legitimate Interests (to improve the app) and Consent (for GPS and notifications, which you can withdraw anytime)."},
            {t:"5. Data Storage & Security",b:"Your data is stored securely in Google Firebase (London region) with HTTPS encryption. Payments are handled by Stripe (PCI-DSS compliant)."},
            {t:"6. Your Rights",b:"You have the right to access, correct, delete or export your data at any time. Email us at miahtechlimited@outlook.com. You can also complain to the ICO at ico.org.uk."},
            {t:"7. GPS & Location",b:"Location is only used when you tap 'Use My GPS Location'. It is not stored permanently. You can revoke permission in your device settings at any time."},
            {t:"8. Cookies",b:"We do not use tracking cookies. Firebase uses essential session cookies to keep you logged in."},
            {t:"9. Children",b:"Golden Boot is not for under-16s. If you believe a child has registered, please contact us immediately."},
            {t:"10. Changes",b:"We may update this policy and will notify you in-app. Continued use after changes means you accept the updated policy."},
          ].map((s,i)=>(
            <div key={i} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"13px 14px",marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:13,color:"var(--gold)",marginBottom:6}}>{s.t}</div>
              <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.7}}>{s.b}</div>
            </div>
          ))}
          <div style={{background:"rgba(255,215,0,0.05)",border:"1px solid rgba(255,215,0,0.2)",borderRadius:12,padding:14,marginTop:8,textAlign:"center"}}>
            <div style={{fontSize:12,color:"var(--muted)"}}>Questions? Contact us at</div>
            <div style={{color:"var(--gold)",fontWeight:700,fontSize:13,marginTop:4}}>miahtechlimited@outlook.com</div>
          </div>
        </div>

        {/* TERMS & CONDITIONS SCREEN */}
        <div className={"screen fade-up"+(screen==="terms"?" active":"")} id="s-terms">
          <button className="back-btn" onClick={()=>history.back?history.back():go("auth")}>← Back</button>
          <div className="sec-title">Terms & <span>Conditions</span></div>
          <div style={{color:"var(--muted)",fontSize:12,marginBottom:16}}>Last updated: July 2026 · Governed by English law</div>
          {[
            {t:"1. Eligibility",b:"You must be 16 or older to use Golden Boot. You must provide accurate information and keep your account secure."},
            {t:"2. User Responsibilities",b:"Treat all players and venues with respect. Do not use the platform for unlawful purposes. Repeated no-shows may result in account suspension."},
            {t:"3. Hosting a Game",b:"As a host you are responsible for accurate game details. If you cancel, do so via the app. A full refund will be issued to all players automatically."},
            {t:"4. Joining a Game",b:"Payment confirms your spot. If the host cancels, you receive a full refund within 3-5 business days. Player cancellation refunds are at the host's discretion."},
            {t:"5. Payments",b:"All payments are processed by Stripe. We do not store your card details. A platform service fee applies to each booking."},
            {t:"6. Refunds",b:"Host cancels → full refund. Player cancels 24hrs+ before → host's discretion. Player cancels under 24hrs → no refund unless exceptional circumstances apply."},
            {t:"7. Pitch Bookings",b:"Golden Boot facilitates pitch bookings but is not responsible for venue quality or availability. Disputes with venues should be raised directly with them."},
            {t:"8. Health & Safety",b:"Football carries a risk of injury. You participate at your own risk. Golden Boot is not liable for injuries sustained at games arranged through the platform. Personal sports insurance is recommended."},
            {t:"9. Intellectual Property",b:"All Golden Boot content, design and features are owned by Miah & Co Consultancy. You may not copy or reproduce any part without written permission."},
            {t:"10. Limitation of Liability",b:"Our liability to you is limited to the amount you paid us in the 3 months before any claim. We are not liable for indirect or consequential loss."},
            {t:"11. Governing Law",b:"These terms are governed by the laws of England and Wales. Disputes are subject to the jurisdiction of English courts."},
          ].map((s,i)=>(
            <div key={i} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"13px 14px",marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:13,color:"var(--gold)",marginBottom:6}}>{s.t}</div>
              <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.7}}>{s.b}</div>
            </div>
          ))}
          <div style={{background:"rgba(255,215,0,0.05)",border:"1px solid rgba(255,215,0,0.2)",borderRadius:12,padding:14,marginTop:8,textAlign:"center"}}>
            <div style={{fontSize:12,color:"var(--muted)"}}>Questions? Contact us at</div>
            <div style={{color:"var(--gold)",fontWeight:700,fontSize:13,marginTop:4}}>miahtechlimited@outlook.com</div>
          </div>
        </div>

        {/* NAV */}
        <div className="nav">
          <div style={{textAlign:"center",padding:"6px 0 2px",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
            <span onClick={()=>go("privacy")} style={{fontSize:10,color:"#3a5a3a",cursor:"pointer",textDecoration:"underline",marginRight:12}}>Privacy Policy</span>
            <span onClick={()=>go("terms")} style={{fontSize:10,color:"#3a5a3a",cursor:"pointer",textDecoration:"underline"}}>Terms & Conditions</span>
          </div>
          {[{id:"home",icon:"🏠",label:"Home"},{id:"games",icon:"⚽",label:"Games"},{id:"pitches",icon:"📍",label:"Pitches"},{id:"social",icon:"👥",label:"Social"},{id:"ai",icon:"✨",label:"AI"},{id:"profile",icon:"👤",label:"Profile"}].map(tab=>(
            <button key={tab.id} className={"ntab"+(screen===tab.id||screen==="gamedetail"&&tab.id==="games"||screen==="create"&&tab.id==="games"||screen==="chat"&&tab.id==="games"||screen==="auth"&&tab.id==="profile"?" active":"")} onClick={()=>go(tab.id)}>
              <span>{tab.icon}</span>{tab.label}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
