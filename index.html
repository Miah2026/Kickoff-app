// Haversine distance formula
function getDistance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function SubmitResultForm({user, games, showToast, go, db, gbFirestore}){
  const [selectedGame, setSelectedGame] = React.useState("");
  const [scorers, setScorers] = React.useState({});
  const [assists, setAssists] = React.useState({});
  const [teamScore, setTeamScore] = React.useState("");
  const [oppScore, setOppScore] = React.useState("");
  const [submitted, setSubmitted] = React.useState(false);

  // Only show games where user is the HOST and game has ended
  const hostedGames = games.filter(g=>
    user &&
    g.hostUid === user.uid &&
    new Date(g.date+"T"+g.time) < new Date() &&
    !g.resultsSubmitted
  );

  const selectedGameData = games.find(g=>g.id===selectedGame);

  async function handleSubmit(){
    if(!selectedGame)return showToast("Please select a game!");
    if(!user)return showToast("Please sign in first!");
    const {doc, updateDoc} = gbFirestore;
    try{
      const results = (selectedGameData?.players||[]).map(p=>({
        uid: p.uid,
        name: p.name,
        goals: parseInt(scorers[p.uid])||0,
        assists: parseInt(assists[p.uid])||0,
      }));
      await updateDoc(doc(db,"games",selectedGame),{
        results,
        teamScore: parseInt(teamScore)||0,
        oppScore: parseInt(oppScore)||0,
        resultsSubmitted: true,
        resultsSubmittedAt: new Date().toISOString(),
        resultsSubmittedBy: user.displayName||user.email,
      });
      setSubmitted(true);
      showToast("Results submitted! Leaderboard updated! 🏆");
      setTimeout(()=>go("award"),2000);
    }catch(e){showToast("Error submitting. Try again.");}
  }

  if(!user) return(
    <div style={{textAlign:"center",padding:"30px 0"}}>
      <div style={{fontSize:13,color:"var(--muted)",marginBottom:16}}>Sign in to submit results</div>
      <button className="btn-gold" onClick={()=>go("auth")}>Sign In 🏆</button>
    </div>
  );

  if(submitted) return(
    <div style={{textAlign:"center",padding:"40px 20px"}}>
      <div style={{fontSize:60,marginBottom:12}}>🏆</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:"var(--gold)",marginBottom:8}}>Results Submitted!</div>
      <div style={{fontSize:13,color:"var(--muted)"}}>The leaderboard has been updated!</div>
    </div>
  );

  if(hostedGames.length===0) return(
    <div style={{textAlign:"center",padding:"30px 20px"}}>
      <div style={{fontSize:40,marginBottom:12}}>🏟️</div>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,color:"var(--gold)",letterSpacing:1,marginBottom:8}}>NO GAMES TO SUBMIT</div>
      <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.7,marginBottom:8}}>Only game <strong style={{color:"#eee"}}>hosts</strong> can submit results. This keeps the Golden Boot leaderboard fair and cheat-proof!</div>
      <div style={{background:"rgba(255,215,0,0.05)",border:"1px solid rgba(255,215,0,0.15)",borderRadius:10,padding:12,fontSize:12,color:"var(--muted)",lineHeight:1.7,marginBottom:14}}>
        Host a game, let it complete, then come back here to submit the goal scorers and final score.
      </div>
      <button className="btn-dark" onClick={()=>go("create")}>Host a Game 🏟️</button>
    </div>
  );

  return(
    <div>
      {/* Host only notice */}
      <div style={{background:"rgba(255,215,0,0.05)",border:"1px solid rgba(255,215,0,0.2)",borderRadius:10,padding:12,marginBottom:16,display:"flex",gap:10,alignItems:"flex-start"}}>
        <span style={{fontSize:18,flexShrink:0}}>👑</span>
        <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.7}}>Only the <strong style={{color:"var(--gold)"}}>game host</strong> can submit results. This ensures fairness and prevents cheating on the Golden Boot leaderboard.</div>
      </div>

      {/* Select game */}
      <div style={{marginBottom:14}}>
        <label style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6,fontFamily:"'Barlow Condensed',sans-serif"}}>Select Your Completed Game</label>
        <select value={selectedGame} onChange={e=>setSelectedGame(e.target.value)}>
          <option value="">Choose a game you hosted...</option>
          {hostedGames.map(g=><option key={g.id} value={g.id}>{g.title} — {g.date}</option>)}
        </select>
      </div>

      {/* Final score */}
      {selectedGame&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            <div>
              <label style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6,fontFamily:"'Barlow Condensed',sans-serif"}}>Your Team Score</label>
              <input type="number" placeholder="0" min="0" value={teamScore} onChange={e=>setTeamScore(e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6,fontFamily:"'Barlow Condensed',sans-serif"}}>Opposition Score</label>
              <input type="number" placeholder="0" min="0" value={oppScore} onChange={e=>setOppScore(e.target.value)}/>
            </div>
          </div>

          {/* Goal scorers per player */}
          <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:10,fontFamily:"'Barlow Condensed',sans-serif"}}>⚽ Goals & Assists Per Player</div>
          {(selectedGameData?.players||[]).map(p=>(
            <div key={p.uid} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,var(--gold-dark),var(--gold))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#000",flexShrink:0}}>{(p.name||"?").charAt(0).toUpperCase()}</div>
                <div style={{fontWeight:600,fontSize:13,color:"#eee"}}>{p.name} {p.uid===user.uid?"(You)":""} {p.uid===selectedGameData?.hostUid?"👑":""}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div>
                  <label style={{fontSize:9,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:4,fontFamily:"'Barlow Condensed',sans-serif"}}>Goals ⚽</label>
                  <input type="number" placeholder="0" min="0" value={scorers[p.uid]||""} onChange={e=>setScorers({...scorers,[p.uid]:e.target.value})} style={{padding:"8px 10px",fontSize:13}}/>
                </div>
                <div>
                  <label style={{fontSize:9,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:4,fontFamily:"'Barlow Condensed',sans-serif"}}>Assists 🎯</label>
                  <input type="number" placeholder="0" min="0" value={assists[p.uid]||""} onChange={e=>setAssists({...assists,[p.uid]:e.target.value})} style={{padding:"8px 10px",fontSize:13}}/>
                </div>
              </div>
            </div>
          ))}

          <div style={{background:"rgba(255,215,0,0.05)",border:"1px solid rgba(255,215,0,0.15)",borderRadius:10,padding:12,marginBottom:14,fontSize:12,color:"var(--muted)",lineHeight:1.7}}>
            ⚠️ Once submitted, results cannot be changed. Please double-check all goals and assists before submitting.
          </div>
          <button className="btn-gold" onClick={handleSubmit}>Submit Final Results 🏆</button>
        </>
      )}
    </div>
  );
}

function StripePaymentForm({game, user, onSuccess, onError, showToast, joinGame}){
  const [loading, setLoading] = React.useState(false);
  const [cardReady, setCardReady] = React.useState(false);
  const stripeRef = React.useRef(null);
  const cardRef = React.useRef(null);

  React.useEffect(()=>{
    if(!window.Stripe)return;
    try{
      const stripe = window.Stripe(STRIPE_PK);
      stripeRef.current = stripe;
      const elements = stripe.elements({
        appearance: {
          theme: 'night',
          variables: {
            colorPrimary: '#FFD700',
            colorBackground: '#0f1a0f',
            colorText: '#ffffff',
            colorDanger: '#ff5252',
            fontFamily: 'Barlow, sans-serif',
            borderRadius: '8px',
          }
        }
      });
      const card = elements.create('card', {
        style: {
          base: {
            color: '#fff',
            fontFamily: 'Barlow, sans-serif',
            fontSize: '15px',
            '::placeholder': { color: '#6a8a6a' }
          },
          invalid: { color: '#ff5252' }
        }
      });
      card.mount('#stripe-card-element');
      card.on('ready', ()=>setCardReady(true));
      card.on('change', e=>{
        const el = document.getElementById('stripe-errors');
        if(el) el.textContent = e.error ? e.error.message : '';
      });
      cardRef.current = card;
    }catch(e){ console.log('Stripe init error:', e); }
    return ()=>{ if(cardRef.current){ try{ cardRef.current.destroy(); }catch(e){} } };
  },[]);

  async function handlePay(){
    if(!stripeRef.current||!cardRef.current)return showToast("Payment system loading...");
    setLoading(true);
    try{
      // First join the game in Firebase
      await joinGame(game);
      onSuccess();
      if(window.trackEvent)window.trackEvent('purchase',{currency:'GBP',value:9,game_title:game.title});
    }catch(e){
      setLoading(false);
      onError("Payment failed. Please try again.");
    }
  }

  return(
    <button className="btn-gold" style={{fontSize:16,padding:"15px",opacity:loading?0.7:1}} onClick={handlePay} disabled={loading}>
      {loading?"Processing payment... ⏳":`Pay £${playerPrice(game).toFixed(2)} — Join Game 🏆`}
    </button>
  );
}

  const [socialTab,setSocialTab]=useState("ratings");
  const [ratings,setRatings]=useState({});

  const [pitchSearch,setPitchSearch]=useState("");
  // GPS
  const [userLocation,setUserLocation]=useState(null);
  const [gpsLoading,setGpsLoading]=useState(false);
  const [gpsError,setGpsError]=useState("");
  // Postcode fallback
  const [postcode,setPostcode]=useState("");
  const [postcodeArea,setPostcodeArea]=useState(null);
  const [postcodeSearched,setPostcodeSearched]=useState(false);
  // Real Firebase chat
  const [chatMsgs,setChatMsgs]=useState([]);
  const [chatMsg,setChatMsg]=useState("");
  const [chatLoading,setChatLoading]=useState(false);
  const chatUnsubRef=useRef(null);
  const chatEndRef=useRef(null);
  // POTM voting
  const [potmVote,setPotmVote]=useState(null);

  useEffect(()=>{
    if(window._gbReady){initFb();return;}
    window.addEventListener("firebase-ready",()=>initFb());
  },[]);

  function initFb(){
    const {onAuthStateChanged}=window._gbAuthFns;
    onAuthStateChanged(window._gbAuth,u=>{
      if(u){setUser(u);loadGames();}
      else{setUser(null);}
      setLoading(false);
    });
  }

  function loadGames(){
    const {collection,onSnapshot,query,orderBy}=window._gbFirestore;
    const db=window._gbDb;
    try{
      const q=query(collection(db,"games"),orderBy("createdAt","desc"));
      onSnapshot(q,snap=>{setGames(snap.docs.map(d=>({id:d.id,...d.data()})));});
    }catch(e){console.log(e);}
  }

  // Real Firebase chat listener
  function openChat(gameId){
    if(chatUnsubRef.current){chatUnsubRef.current();}
    setChatMsgs([]);setChatLoading(true);
    const {collection,onSnapshot,query,orderBy}=window._gbFirestore;
    const db=window._gbDb;
    try{
      const q=query(collection(db,"games",gameId,"messages"),orderBy("createdAt","asc"));
      chatUnsubRef.current=onSnapshot(q,snap=>{
        setChatMsgs(snap.docs.map(d=>({id:d.id,...d.data()})));
        setChatLoading(false);

  // Browser notification reminder
  function scheduleReminder(game){
    if(!("Notification" in window))return;
    Notification.requestPermission().then(perm=>{
      if(perm==="granted"){
        const gameDate=new Date(game.date+"T"+game.time);
        const reminderTime=gameDate.getTime()-24*60*60*1000;
        const now=Date.now();
        if(reminderTime>now){
          const delay=reminderTime-now;
          if(delay<2147483647){
            setTimeout(()=>{
              new Notification("Golden Boot ⚽ Reminder",{
                body:"You have a game tomorrow: "+game.title+" at "+game.time,
                icon:"/favicon.ico"
              });
            },delay);
          }
        }
        showToast("⏰ Pre-match reminder set for 24hrs before kick-off!");
      }
    });
  }

  function requestReminder(game){
    if(!("Notification" in window)){showToast("Notifications not supported on this browser.");return;}

  const POSTCODE_AREAS={"E1":"East London","E2":"East London","E3":"East London","E6":"Beckton","E8":"Hackney","E9":"Hackney","E20":"Stratford","EC1":"Old Street","EC2":"Shoreditch","N1":"Islington","N17":"Tottenham","NW1":"Camden","NW10":"North London","SE1":"South London","SE15":"Peckham","SW6":"Fulham","SW19":"Wimbledon","W1":"West End","HA9":"Wembley"};
  function getAreaFromPostcode(pc){
    if(!pc)return null;
    const c=pc.trim().toUpperCase().replace(/\s/g,"");
    return POSTCODE_AREAS[c.substring(0,3)]||POSTCODE_AREAS[c.substring(0,2)]||null;
  }

  function getSortedGames(){
    // Show public games + private games user is part of
    let g=(filter==="All"?games:games.filter(x=>x.format===filter)).filter(game=>{
      if(!game.isPrivate)return true;
      if(!user)return false;
      return (game.players||[]).find(p=>p.uid===user.uid)||(game.hostUid===user.uid);
    });
    if(userLocation){
      // Find pitch lat/lng from name
      g=g.map(game=>{
        const pitch=LONDON_PITCHES.find(p=>game.location&&game.location.includes(p.name));
        const dist=pitch?getDistance(userLocation.lat,userLocation.lng,pitch.lat,pitch.lng):999;
        return {...game,_dist:dist};
      }).sort((a,b)=>a._dist-b._dist);
    } else if(postcodeSearched&&postcodeArea){
      g=[...g].sort((a,b)=>{
        const aM=(a.location||"").toLowerCase().includes(postcodeArea.toLowerCase());
        const bM=(b.location||"").toLowerCase().includes(postcodeArea.toLowerCase());
        if(aM&&!bM)return -1;if(!aM&&bM)return 1;return 0;
      });
    }
    return g;
  }

  function getSortedPitches(){
    let p=LONDON_PITCHES;
    if(pitchFilter!=="All")p=p.filter(x=>x.types.includes(pitchFilter));
    if(pitchSearch.trim())p=p.filter(x=>x.name.toLowerCase().includes(pitchSearch.toLowerCase())||x.area.toLowerCase().includes(pitchSearch.toLowerCase())||x.postcode.toLowerCase().includes(pitchSearch.toLowerCase()));

      p=[...p].map(x=>({...x,_dist:getDistance(userLocation.lat,userLocation.lng,x.lat,x.lng)})).sort((a,b)=>a._dist-b._dist);

  }

            <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>goldenbootfc.co.uk</div>
          </div>
        </div>

        {/* GOLDEN BOOT AWARD SCREEN */}
        <div className={"screen fade-up"+(screen==="award"?" active":"")} id="s-award">
          <button className="back-btn" onClick={()=>go(prevScreen||"social")}>← Back</button>

          {/* Hero */}
          <div style={{textAlign:"center",padding:"10px 0 20px"}}>
            <div style={{fontSize:64,marginBottom:8}}>🥇</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,color:"var(--gold)",lineHeight:1.2,marginBottom:8}}>The Golden Boot<br/>Award</div>
            <div style={{fontSize:13,color:"var(--muted)",lineHeight:1.8,padding:"0 10px"}}>Every 6 months, the top goal scorer across all Golden Boot games receives a <strong style={{color:"var(--gold)"}}>real physical Golden Boot trophy</strong> — personally awarded by the Golden Boot team.</div>
          </div>

          {/* Trophy visual */}
          <div style={{background:"linear-gradient(135deg,rgba(255,215,0,0.12),rgba(255,215,0,0.03))",border:"2px solid rgba(255,215,0,0.3)",borderRadius:16,padding:20,marginBottom:16,textAlign:"center"}}>
            <div style={{fontSize:80,marginBottom:8}}>🏆</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,color:"var(--gold)",letterSpacing:2,marginBottom:4}}>SEASON 1 · 2026</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#fff",marginBottom:4}}>Top Goal Scorer</div>
            <div style={{fontSize:13,color:"var(--muted)"}}>Season ends: <span style={{color:"var(--gold)",fontWeight:700}}>December 2026</span></div>
            <div style={{marginTop:12,background:"rgba(0,0,0,0.4)",borderRadius:10,padding:"10px 16px",display:"inline-block"}}>
              <div style={{fontSize:11,color:"var(--muted)",marginBottom:4,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>PRIZE</div>
              <div style={{fontSize:14,color:"var(--gold)",fontWeight:700}}>Real Golden Boot Trophy 🥇</div>
              <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>Physically awarded in London</div>
            </div>
          </div>

          {/* Current Season Leaderboard */}
          <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:10,fontFamily:"'Barlow Condensed',sans-serif"}}>⚽ Season 1 Leaderboard — Top Scorers</div>

          {/* Real players from Firebase games */}
          {(()=>{
            // Build leaderboard from game results
            const scorers={};
            games.forEach(g=>{
              (g.results||[]).forEach(r=>{
                if(r.goals>0){
                  if(!scorers[r.name])scorers[r.name]={name:r.name,goals:0,games:0,uid:r.uid};
                  scorers[r.name].goals+=r.goals;
                  scorers[r.name].games+=1;
                }
              });
            });
            const sorted=Object.values(scorers).sort((a,b)=>b.goals-a.goals).slice(0,10);
            if(sorted.length===0){
              return(
                <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:20,textAlign:"center",marginBottom:12}}>
                  <div style={{fontSize:32,marginBottom:8}}>⚽</div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,color:"var(--gold)",letterSpacing:1,marginBottom:6}}>NO SCORES YET!</div>
                  <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.7}}>Play games and submit your match results to appear on the Golden Boot leaderboard. The race starts now! 🏆</div>
                </div>
              );
            }
            return sorted.map((p,i)=>(
              <div key={p.name} style={{background:i===0?"linear-gradient(135deg,rgba(255,215,0,0.12),rgba(255,215,0,0.04))":"var(--card)",border:`1px solid ${i===0?"rgba(255,215,0,0.4)":"var(--border)"}`,borderRadius:12,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:i===0?"var(--gold)":i===1?"rgba(180,180,180,0.3)":i===2?"rgba(180,120,60,0.3)":"rgba(255,255,255,0.05)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:i===0?14:12,fontWeight:800,color:i===0?"#000":"var(--gold)",flexShrink:0,fontFamily:"'Barlow Condensed',sans-serif"}}>
                  {i===0?"👑":i+1}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:i===0?"var(--gold)":"#eee"}}>{p.name} {i===0?"🏆":""}</div>
                  <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{p.games} game{p.games!==1?"s":""} played</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,color:i===0?"var(--gold)":"#eee"}}>{p.goals}</div>
                  <div style={{fontSize:10,color:"var(--muted)"}}>goals</div>
                </div>
              </div>
            ));
          })()}

          {/* Submit result CTA */}
          <div style={{background:"rgba(255,215,0,0.05)",border:"1px solid rgba(255,215,0,0.2)",borderRadius:12,padding:14,marginBottom:12,marginTop:8}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,color:"var(--gold)",letterSpacing:1,marginBottom:6}}>📊 PLAYED A GAME? SUBMIT YOUR RESULT</div>
            <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.7,marginBottom:10}}>After every game, submit the result and your goal tally to climb the Golden Boot leaderboard!</div>
            <button className="btn-gold" style={{marginBottom:0}} onClick={()=>go("submitresult")}>Submit Match Result ⚽</button>
          </div>

          {/* How it works */}
          <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:10,fontFamily:"'Barlow Condensed',sans-serif"}}>How The Award Works</div>
          {[
            {icon:"⚽",text:"Play games organised through Golden Boot"},
            {icon:"📊",text:"Submit your match results and goal tallies after each game"},
            {icon:"🏆",text:"Top goal scorer after 6 months wins the Golden Boot"},
            {icon:"🥇",text:"Receive a real physical Golden Boot trophy, personally awarded in London"},
            {icon:"📸",text:"Your achievement is celebrated across the Golden Boot community"},
          ].map((s,i)=>(
            <div key={i} style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>
              <span style={{fontSize:20,flexShrink:0}}>{s.icon}</span>
              <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.7,paddingTop:2}}>{s.text}</div>
            </div>
          ))}

          {/* Season dates */}
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:14,marginTop:4}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,color:"var(--gold)",letterSpacing:1,marginBottom:10}}>📅 SEASON DATES</div>
            {[
              {season:"Season 1",dates:"July 2026 — December 2026",status:"🟢 Active"},
              {season:"Season 2",dates:"January 2027 — June 2027",status:"🔜 Coming Soon"},
            ].map((s,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i===0?"1px solid rgba(255,255,255,0.05)":"none"}}>
                <div>
                  <div style={{fontSize:13,color:"#eee",fontWeight:600}}>{s.season}</div>
                  <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{s.dates}</div>
                </div>
                <span style={{fontSize:12,color:"var(--gold)"}}>{s.status}</span>
              </div>
            ))}
          </div>
        </div>

        {/* SUBMIT MATCH RESULT SCREEN */}
        <div className={"screen fade-up"+(screen==="submitresult"?" active":"")} id="s-submitresult">
          <button className="back-btn" onClick={()=>go("award")}>← Back</button>
          <div className="sec-title">Submit <span>Result</span></div>
          <div style={{color:"var(--muted)",fontSize:13,marginBottom:16}}>Submit your match result to update the Golden Boot leaderboard!</div>
          <SubmitResultForm user={user} games={games} showToast={showToast} go={go} db={window._gbDb} gbFirestore={window._gbFirestore}/>
        </div>

        {/* NAV */}
        <div className="nav">
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:12,padding:"3px 0",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
            <span onClick={()=>go("privacy")} style={{fontSize:9,color:"#3a5a3a",cursor:"pointer",whiteSpace:"nowrap",letterSpacing:"0.3px"}}>Privacy</span>
            <span style={{fontSize:9,color:"#2a3a2a"}}>|</span>
            <span onClick={()=>go("terms")} style={{fontSize:9,color:"#3a5a3a",cursor:"pointer",whiteSpace:"nowrap",letterSpacing:"0.3px"}}>Terms</span>
          </div>
          {[{id:"home",icon:"🏠",label:"Home"},{id:"games",icon:"⚽",label:"Games"},{id:"pitches",icon:"📍",label:"Pitches"},{id:"social",icon:"👥",label:"Social"},{id:"ai",icon:"✨",label:"AI"}].map(tab=>(
            <button key={tab.id} className={"ntab"+(screen===tab.id||screen==="gamedetail"&&tab.id==="games"||screen==="create"&&tab.id==="games"||screen==="chat"&&tab.id==="games"||screen==="auth"&&tab.id==="profile"?" active":"")} onClick={()=>go(tab.id)}>
              <span>{tab.icon}</span>{tab.label}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
